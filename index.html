    function QuotesView({ quotes, setQuotes, clients, onSelectQuote }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [form, setForm] = useState({ clientId: '', items: [{ name: '', qty: 1, rate: 0 }] });

      const getSubtotal = () => form.items.reduce((sum, item) => sum + (item.qty * item.rate), 0);
      const getGST = () => getSubtotal() * 0.18;
      const getTotal = () => getSubtotal() + getGST();

      const updateItem = (index, field, value) => {
        const newItems = form.items.map((item, i) =>
          i === index ? { ...item, [field]: field === 'name' ? value : Number(value) } : item
        );
        setForm({ ...form, items: newItems });
      };

      const handleSave = (e) => {
        e.preventDefault();
        if(!form.clientId) return alert("Select a client");
        
        if (editId !== null) {
          setQuotes(quotes.map(q => 
            q.id === editId 
              ? { ...q, clientId: parseInt(form.clientId), total: getTotal(), items: form.items }
              : q
          ));
        } else {
          setQuotes([{
            id: Date.now(),
            clientId: parseInt(form.clientId),
            total: getTotal(),
            status: 'draft',
            date: new Date().toISOString().split('T')[0],
            items: form.items
          }, ...quotes]);
        }
        
        handleCloseModal();
      };

      const handleCloseModal = () => {
        setEditId(null);
        setIsModalOpen(false);
        setForm({ clientId: '', items: [{ name: '', qty: 1, rate: 0 }] });
      };

      const getBadge = (status) => {
        const map = { approved: 'success', sent: 'info', draft: 'default', rejected: 'danger' };
        return <Badge variant={map[status]} className="capitalize">{status}</Badge>;
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-end">
            <Button onClick={() => setIsModalOpen(true)}><Plus size={16} className="mr-2" /> Create Quote</Button>

                    const client = clients.find(c => c.id === q.clientId);

                    const rowWhatsappText = q.status === 'approved'

                    const rowEmailBody = `Hi ${client?.name || 'Client'},\n\nPlease find attached your quotation QT-${q.id} for ${formatINR(q.total)}, valid until ${formattedVDate}.\n\nThank you,\nTagverse CRM`;

                  <Button type="button" variant="ghost" size="sm" onClick={() => setForm({...form, items: [...form.items, {name:'', qty:1, rate:0}]})} className="text-slate-600 mt-2">

    function SignatureModal({ isOpen, onClose, onSubmit, quoteId }) {
      const canvasRef = React.useRef(null);
      const [hasDrawn, setHasDrawn] = useState(false);
      const [tab, setTab] = useState('draw'); // 'draw' | 'type'
      const [signerName, setSignerName] = useState('');
      const [typedName, setTypedName] = useState('');
      const [isDrawing, setIsDrawing] = useState(false);

      const getCanvasCoords = (e, canvas) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        return {
          x: ((clientX - rect.left) / rect.width) * canvas.width,
          y: ((clientY - rect.top) / rect.height) * canvas.height
        };
      };

      const handleStart = (e) => {
        e.preventDefault();
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        // Ensure styles are set on drawing start
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#111';

        const coords = getCanvasCoords(e, canvas);
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
        setIsDrawing(true);
      };

      const handleMove = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const coords = getCanvasCoords(e, canvas);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
        setHasDrawn(true);
      };

      const handleEnd = () => {
        setIsDrawing(false);
      };

      const handleClear = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        setHasDrawn(false);
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.lineWidth = 2.5;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.strokeStyle = '#111';
        }
      }, [tab, isOpen]);

      const handleFormSubmit = (e) => {
        e.preventDefault();
        if (!signerName.trim()) {
          alert("Signer Name is required.");
          return;
        }

        let signature = '';
        if (tab === 'draw') {
          if (!hasDrawn) {
            alert("Please draw your signature.");
            return;
          }
          const canvas = canvasRef.current;
          signature = canvas.toDataURL('image/png');
        } else {
          if (!typedName.trim()) {
            alert("Please type your signature.");
            return;
          }
          signature = typedName.trim();
        }

        const timestamp = new Date().toISOString();
        const verificationHash = btoa(unescape(encodeURIComponent(signerName + timestamp))).replace(/[^A-Z0-9]/gi, '').slice(-12).toUpperCase();

        onSubmit({
          signature,
          signatureType: tab === 'draw' ? 'drawn' : 'typed',
          signerName: signerName.trim(),
          verificationHash,
          signedAt: timestamp
        });
      };

      return (
        <Dialog isOpen={isOpen} onClose={onClose} title={`Digitally Sign Quotation QT-${quoteId}`} maxWidth="max-w-md">
          <form onSubmit={handleFormSubmit} className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Signer Name *</label>
              <Input required value={signerName} onChange={e => setSignerName(e.target.value)} placeholder="e.g. Sarah Jane" />
            </div>

            <div className="border-b border-slate-200">
              <nav className="flex -mb-px space-x-6">
                <button type="button" onClick={() => setTab('draw')} className={`pb-2 text-sm font-medium border-b-2 transition-colors ${tab === 'draw' ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>Draw Signature</button>
                <button type="button" onClick={() => setTab('type')} className={`pb-2 text-sm font-medium border-b-2 transition-colors ${tab === 'type' ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>Type Signature</button>
              </nav>
            </div>

            {tab === 'draw' ? (
              <div className="space-y-2">
                <canvas 
                  ref={canvasRef} 
                  width={400} 
                  height={160} 
                  className="border border-slate-200 rounded-lg bg-white cursor-crosshair w-full h-[160px] touch-none" 
                  onMouseDown={handleStart} 
                  onMouseMove={handleMove} 
                  onMouseUp={handleEnd} 
                  onMouseLeave={handleEnd} 
                  onTouchStart={handleStart} 
                  onTouchMove={handleMove} 
                  onTouchEnd={handleEnd} 
                />
                <div className="flex justify-end">
                  <Button type="button" variant="outline" size="sm" onClick={handleClear}>Clear Canvas</Button>
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                <Input value={typedName} onChange={e => setTypedName(e.target.value)} placeholder="Type your signature..." />
                <div className="text-4xl border border-slate-200 p-6 rounded-lg bg-slate-50 text-center font-serif text-slate-800 italic min-h-[100px] flex items-center justify-center select-none" style={{ fontFamily: "'Brush Script MT', 'Parisienne', cursive" }}>
                  {typedName || 'Signature Preview'}
                </div>
              </div>
            )}

            <div className="pt-4 flex justify-end gap-3 border-t border-slate-100">
              <Button type="button" variant="ghost" onClick={onClose}>Cancel</Button>
              <Button type="submit">Sign & Approve</Button>
            </div>
          </form>
        </Dialog>
      );
    }

          clientId: parseInt(form.clientId), 
          status: form.status,
          progress: Number(form.progress),

          revisions: Number(form.revisions),
          maxRevisions: Number(form.maxRevisions),
          deadline: form.deadline,

        <div className="space-y-6">

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                    <p className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-4">{client?.company || 'Unknown Client'}</p>

                        <span className="font-semibold text-slate-900">{project.progress}%</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">

                  <div className="flex items-center justify-between text-xs text-slate-500 pt-3 border-t border-slate-100">
                    <span className="flex items-center"><Calendar size={12} className="mr-1"/> {project.deadline ? formatDate(project.deadline) : 'No deadline'}</span>
                    <span className="flex items-center"><CheckSquare size={12} className="mr-1"/> Details <ChevronLeft size={12} className="rotate-180 ml-1"/></span>

    function ProjectDetailView({ projectId, projects, setProjects, clients, tasks, setTasks, onBack }) {
      const project = projects.find(p => p.id === projectId);
      const client = clients.find(c => c.id === project?.clientId);
      const projectTasks = tasks.filter(t => t.projectId === projectId);
      
      const [isTemplateModalOpen, setIsTemplateModalOpen] = useState(false);

      if (!project) return null;

      const handleHealthChange = (health) => {
        setProjects(projects.map(p => p.id === projectId ? { ...p, health } : p));
      };

      const handleRevisionAdd = () => {
        const rev = (project.revisions || 0) + 1;
        setProjects(projects.map(p => p.id === projectId ? { ...p, revisions: rev } : p));
      };

      const handleApplyTemplate = (templateId) => {
        const template = mockWorkflowTemplates.find(t => t.id === parseInt(templateId));
        if (!template) return;
        
        const newTasks = template.stages.map((stage, idx) => {
          const date = new Date(TODAY);
          date.setDate(date.getDate() + (idx * 3));
          return {
            id: Date.now() + idx,
            title: `${project.name}: ${stage}`,
            projectId: project.id,
            status: 'todo',
            assignee: mockTeam[Math.floor(Math.random() * mockTeam.length)].name,
            dueDate: date.toISOString().split('T')[0]
          };
        });
        
        setTasks([...tasks, ...newTasks]);
        setIsTemplateModalOpen(false);
      };

      const createdDate = new Date(project.createdDate || TODAY);
      const deadline = new Date(project.deadline || TODAY);
      if (!project.deadline) deadline.setDate(deadline.getDate() + 30);
      const totalDays = Math.max(1, Math.ceil((deadline - createdDate) / (1000 * 60 * 60 * 24)));
      const daysElapsed = Math.max(0, Math.ceil((new Date(TODAY) - createdDate) / (1000 * 60 * 60 * 24)));
      const slaPercentage = Math.min(100, Math.round((daysElapsed / totalDays) * 100));

      const revisions = project.revisions || 0;
      const maxRevisions = project.maxRevisions || 3;
      const revWarning = revisions >= maxRevisions;

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <div className="flex items-center gap-4 mb-2">
            <Button variant="ghost" className="pl-0 text-slate-500" onClick={onBack}>
              <ChevronLeft size={18} className="mr-1" /> Back
            </Button>
            <div className="flex-1" />
            <Button className="bg-slate-900 text-white hover:bg-slate-800 border-transparent" size="sm" onClick={() => setIsTemplateModalOpen(true)}>
              <Zap size={14} className="mr-2" /> Apply Workflow
            </Button>
          </div>

          <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-6 justify-between items-start md:items-center">
            <div>
              <h2 className="text-2xl font-bold text-slate-900 mb-1">{project.name}</h2>
              <p className="text-slate-500 text-sm flex items-center gap-2">
                <Briefcase size={14} /> {client?.company}
              </p>
            </div>
            <div className="flex gap-4 items-center">
              <div className="text-right">
                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Health Status</p>
                <Select className="h-8 py-1 text-xs w-32 font-medium" value={project.health || 'good'} onChange={(e) => handleHealthChange(e.target.value)}>
                  <option value="good">🟢 Good</option>
                  <option value="at_risk">🟡 At Risk</option>
                  <option value="off_track">🔴 Off Track</option>
                </Select>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-1 space-y-6">
              <Card className="p-5">
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Project SLA Timer</h3>
                <div className="flex justify-between items-end mb-2">
                  <span className="text-3xl font-light tracking-tighter text-slate-900">{daysElapsed}</span>
                  <span className="text-sm font-medium text-slate-500 mb-1">/ {totalDays} days</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-2 mb-2">
                  <div className={`h-2 rounded-full ${slaPercentage > 80 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${slaPercentage}%` }} />
                </div>
                <p className="text-xs text-slate-500 text-right">{100 - slaPercentage}% time remaining</p>
              </Card>

              <Card className={`p-5 transition-colors ${revWarning ? 'border-amber-300 bg-amber-50' : ''}`}>
                <div className="flex justify-between items-start mb-4">
                  <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Revisions Used</h3>
                  <Button variant="outline" size="sm" className="h-6 text-[10px] px-2 bg-white" onClick={handleRevisionAdd}>Log Revision</Button>
                </div>
                <div className="flex items-center gap-3">
                  <div className="text-3xl font-bold text-slate-900">{revisions}</div>
                  <div className="text-sm text-slate-500">out of {maxRevisions}</div>
                </div>
                {revWarning && (
                  <div className="mt-3 text-xs font-semibold text-amber-700 flex items-center gap-1.5 bg-amber-100/50 p-2 rounded">
                    <AlertCircle size={12} /> Max revisions reached!
                  </div>
                )}
              </Card>
            </div>

            <div className="md:col-span-2">
              <Card className="p-6 h-full">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="font-bold text-slate-900">Project Timeline</h3>
                  <Badge>{projectTasks.length} Tasks</Badge>
                </div>
                
                {projectTasks.length === 0 ? (
                  <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                    <p className="text-slate-500 mb-4 text-sm font-medium">No tasks assigned to this project yet.</p>
                    <Button onClick={() => setIsTemplateModalOpen(true)}><Zap size={16} className="mr-2" /> Apply Workflow Template</Button>
                  </div>
                ) : (
                  <div className="space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-slate-200 before:via-slate-200 before:to-transparent">
                    {projectTasks.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate)).map((task, idx) => (
                      <div key={task.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                        <div className={`flex items-center justify-center w-10 h-10 rounded-full border-[3px] border-white shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow-sm z-10 ${task.status === 'done' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
                          {task.status === 'done' ? <Check size={16} strokeWidth={3} /> : <span className="text-xs font-bold">{idx + 1}</span>}
                        </div>
                        <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border border-slate-200 bg-white shadow-sm hover:border-slate-300 transition-colors">
                          <div className="flex items-center justify-between mb-1">
                            <h4 className={`font-semibold text-sm ${task.status === 'done' ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{task.title}</h4>
                            <Badge variant={task.status === 'done' ? 'success' : 'default'} className="text-[9px] px-1.5 py-0 capitalize">
                              {task.status}
                            </Badge>
                          </div>
                          <div className="flex items-center gap-3 text-xs text-slate-500 mt-3">
                            <span className="flex items-center gap-1 font-medium bg-slate-100 px-2 py-1 rounded-md"><Calendar size={12} className="text-slate-400"/> {formatDate(task.dueDate)}</span>
                            <span className="flex items-center gap-1.5 font-medium"><Avatar name={task.assignee} className="w-5 h-5 text-[8px]" /> {task.assignee}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            </div>
          </div>

          <Dialog isOpen={isTemplateModalOpen} onClose={() => setIsTemplateModalOpen(false)} title="Apply Workflow Template" maxWidth="max-w-2xl">
            <div className="space-y-4 pb-2">
              <p className="text-sm text-slate-500 mb-4">Select a standardized agency workflow. This will automatically spawn tasks and set timelines.</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {mockWorkflowTemplates.map(template => (
                  <div key={template.id} onClick={() => handleApplyTemplate(template.id)} className="p-4 border border-slate-200 hover:border-slate-900 bg-white hover:bg-slate-50 rounded-xl cursor-pointer transition-all group shadow-sm hover:shadow">
                    <div className="flex justify-between items-start mb-2">
                      <h4 className="font-bold text-sm text-slate-900">{template.name}</h4>
                      <Badge variant="default" className="text-[10px]">{template.stages.length} stages</Badge>
                    </div>
                    <div className="flex gap-1 flex-wrap mt-2">
                      {template.stages.slice(0, 3).map((s, i) => (
                        <span key={i} className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">{s}</span>
                      ))}
                      {template.stages.length > 3 && <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">+{template.stages.length - 3}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </Dialog>
        </div>
      );
    }

    function TasksView({ tasks, setTasks }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [form, setForm] = useState({ title: '', assignee: 'Admin', dueDate: '' });
      const columns = ['todo', 'doing', 'done'];

      const handleDragStart = (e, id) => e.dataTransfer.setData('taskId', id);
      const handleDrop = (e, status) => {
        e.preventDefault();
        const id = parseInt(e.dataTransfer.getData('taskId'));
        setTasks(tasks.map(t => t.id === id ? { ...t, status } : t));
      };

      const handleAdd = (e) => {
        e.preventDefault();
        setTasks([...tasks, { ...form, id: Date.now(), status: 'todo' }]);
        setIsModalOpen(false);
        setForm({ title: '', assignee: 'Admin', dueDate: '' });
      };

      const isOverdue = (dateStr) => new Date(dateStr) < new Date(TODAY);

      return (
        <div className="h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <p className="text-slate-500 text-sm hidden md:block">Track project execution and internal tasks.</p>
            <Button onClick={() => setIsModalOpen(true)} className="ml-auto"><Plus size={16} className="mr-2" /> Add Task</Button>
          </div>

          <div className="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6 pb-4">
            {columns.map(status => (
              <div 
                key={status} 
                className="bg-slate-100/50 rounded-xl p-4 flex flex-col min-h-[300px]"
                onDragOver={(e) => e.preventDefault()}
                onDrop={(e) => handleDrop(e, status)}
              >
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold text-slate-700 capitalize">{status}</h3>
                  <Badge variant="default">{tasks.filter(t => t.status === status).length}</Badge>
                </div>
                <div className="flex-1 space-y-3 overflow-y-auto custom-scrollbar">
                  {tasks.filter(t => t.status === status).map(task => (
                    <Card 
                      key={task.id} 
                      className="p-4 cursor-grab active:cursor-grabbing hover:border-slate-300 transition-colors"
                      draggable
                      onDragStart={(e) => handleDragStart(e, task.id)}
                    >
                      <p className={`font-medium text-sm mb-4 ${status === 'done' ? 'text-slate-400 line-through' : 'text-slate-900'}`}>
                        {task.title}
                      </p>
                      <div className="flex justify-between items-center">
                        <div className={`flex items-center text-[10px] font-semibold uppercase ${isOverdue(task.dueDate) && status !== 'done' ? 'text-red-600 bg-red-50 border border-red-200 px-2 py-0.5 rounded-full' : 'text-slate-400'}`}>
                          <Calendar size={12} className="mr-1.5" />
                          {formatDate(task.dueDate)}
                        </div>
                        <Avatar name={task.assignee} className="w-7 h-7" />
                      </div>
                    </Card>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <Dialog isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="New Task">
            <form onSubmit={handleAdd} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Task Title</label>
                <Input required value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="What needs to be done?" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Assignee</label>
                  <Select value={form.assignee} onChange={e => setForm({...form, assignee: e.target.value})}>
                    <option value="Admin">Admin</option>
                    <option value="Alex">Alex</option>
                    <option value="Sam">Sam</option>
                    <option value="Priya">Priya</option>

                    return (

                  {/* X-axis Labels */}

                    const x = 65 + idx * 112;

                  })}

                  {/* Y-axis Labels */}

                    return (
                      <text key={idx} x={50} y={y + 4} textAnchor="end" fontSize={9} fill="#94A3B8" fontWeight="bold">₹{val >= 100000 ? `${(val / 100000).toFixed(1)}L` : `${val / 1000}`}</text>

                      <stop offset="100%" stopColor="#64748B" stopOpacity="0.0" />

                  {/* Under Fills */}
                  {isMounted && (
                    <>
                      <path 
                        d={`M 65,250

                            L 177,${250 - (billedData[1] / 300000) * 210} 
                            L 289,${250 - (billedData[2] / 300000) * 210} 
                            L 401,${250 - (billedData[3] / 300000) * 210} 
                            L 513,${250 - (billedData[4] / 300000) * 210} 
                            L 625,${250 - (billedData[5] / 300000) * 210}

                      />
                      <path 
                        d={`M 65,250 
                            L 65,${250 - (collectedData[0] / 300000) * 210} 
                            L 177,${250 - (collectedData[1] / 300000) * 210} 
                            L 289,${250 - (collectedData[2] / 300000) * 210} 
                            L 401,${250 - (collectedData[3] / 300000) * 210} 
                            L 513,${250 - (collectedData[4] / 300000) * 210} 
                            L 625,${250 - (collectedData[5] / 300000) * 210} 
                            L 625,250 Z`} 
                        fill="url(#collectedGrad)" 
                        style={{ transition: 'opacity 1s ease-in-out', opacity: isMounted ? 1 : 0 }}
                      />
                    </>
                  )}

                  {/* Lines */}
                  <path 
                    d={`M 65,${250 - (billedData[0] / 300000) * 210} 
                        L 177,${250 - (billedData[1] / 300000) * 210} 
                        L 289,${250 - (billedData[2] / 300000) * 210} 
                        L 401,${250 - (billedData[3] / 300000) * 210} 
                        L 513,${250 - (billedData[4] / 300000) * 210} 
                        L 625,${250 - (billedData[5] / 300000) * 210}`}

                    stroke="#111"

                  <path

                        L 177,${250 - (collectedData[1] / 300000) * 210} 
                        L 289,${250 - (collectedData[2] / 300000) * 210} 
                        L 401,${250 - (collectedData[3] / 300000) * 210} 
                        L 513,${250 - (collectedData[4] / 300000) * 210} 
                        L 625,${250 - (collectedData[5] / 300000) * 210}`} 
                    fill="none" 
                    stroke="#64748B" 
                    strokeWidth={2.5} 
                    strokeLinecap="round"
                    style={{ transition: 'stroke-dashoffset 1.5s ease-in-out', strokeDasharray: 1000, strokeDashoffset: isMounted ? 0 : 1000 }}
                  />

                  {/* Data Points / Interaction Rings */}
                  {months.map((_, idx) => {
                    const x = 65 + idx * 112;
                    const yBilled = 250 - (billedData[idx] / 300000) * 210;
                    const yCollected = 250 - (collectedData[idx] / 300000) * 210;
                    const isHovered = hoveredRevenueIndex === idx;

                    return (
                      <g key={idx}>
                        <circle cx={x} cy={yBilled} r={isHovered ? 6 : 4} fill="#111" stroke="#FFF" strokeWidth={1.5} className="transition-all duration-200" />
                        <circle cx={x} cy={yCollected} r={isHovered ? 6 : 4} fill="#64748B" stroke="#FFF" strokeWidth={1.5} className="transition-all duration-200" />

                        <rect

                          y={20} 
                          width={112} 
                          height={250}

              </div>
              <div className="flex gap-4 justify-center text-xs mt-3 select-none">

                <span className="flex items-center gap-1.5 font-medium text-slate-500"><span className="w-3 h-3 bg-slate-500 rounded-full"></span> Collected Revenue</span>
              </div>
            </Card>

            {/* Widget 2: Sales Funnel */}
            <Card className="p-6 flex flex-col justify-between">
              <div>
                <h3 className="font-semibold text-slate-900 text-base mb-1">Sales Funnel</h3>
                <p className="text-xs text-slate-500 mb-4">Pipeline conversion & customer progression</p>
              </div>
              <div className="relative flex justify-center items-center">
                <svg viewBox="0 0 500 240" className="w-full h-auto">
                  {funnelStages.map((stage, idx) => {
                    const isHovered = hoveredFunnelIndex === idx;
                    const prevCount = idx > 0 ? funnelStages[idx-1].count : stage.count;
                    const conversionRate = prevCount > 0 ? Math.round((stage.count / prevCount) * 100) : 0;
                    const conversionText = idx > 0 ? ` (${conversionRate}% conv)` : '';

                    // Funnel Segment Coordinates
                    // Top Y, Bottom Y
                    const y1 = 10 + idx * 52;
                    const y2 = y1 + 46;

                    // Trapezoid top/bottom widths (proportional to counts)
                    const getWidthForCount = (c) => leadCount > 0 ? Math.max((c / leadCount) * 320, 60) : 60;
                    const topW = idx === 0 ? getWidthForCount(leadCount) : getWidthForCount(funnelStages[idx].count);
                    const botW = idx === 3 ? getWidthForCount(wonCount) * 0.7 : getWidthForCount(funnelStages[idx+1].count);

                    const xT1 = 250 - topW / 2;
                    const xT2 = 250 + topW / 2;
                    const xB1 = 250 - botW / 2;
                    const xB2 = 250 + botW / 2;

                    const points = `${xT1},${y1} ${xT2},${y1} ${xB2},${y2} ${xB1},${y2}`;
                    
                    const opacities = [0.95, 0.8, 0.65, 0.5];
                    const opacityVal = isHovered ? 1.0 : opacities[idx];

                    return (
                      <g key={stage.key}>
                        <polygon 
                          points={points} 
                          fill="#111"
                          opacity={isMounted ? opacityVal : 0}
                          className="transition-all duration-300 cursor-pointer"
                          onMouseEnter={() => setHoveredFunnelIndex(idx)}
                          onMouseLeave={() => setHoveredFunnelIndex(null)}
                          style={{ transition: 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease-out', transform: isMounted ? 'translateY(0)' : 'translateY(15px)' }}
                        />
                        <text x={250} y={y1 + 27} textAnchor="middle" fill="#FFF" fontSize={11} fontWeight="bold" className="pointer-events-none select-none uppercase tracking-wider">{stage.name}: {stage.count}{conversionText}</text>
                      </g>
                    );
                  })}

                  {/* Funnel Dropoff / Conversion Tooltip */}
                  {hoveredFunnelIndex !== null && (
                    <g transform={`translate(360, ${Math.max(10, 10 + hoveredFunnelIndex * 52 - 10)})`} className="pointer-events-none transition-transform duration-200">
                      <rect width={130} height={60} rx={8} fill="#111" opacity={0.95} />
                      <text x={12} y={18} fill="#FFF" fontSize={10} fontWeight="bold">{funnelStages[hoveredFunnelIndex].name} Stage</text>
                      <text x={12} y={34} fill="#CBD5E1" fontSize={9}>Count: <tspan fill="#FFF" fontWeight="bold">{funnelStages[hoveredFunnelIndex].count}</tspan></text>
                      <text x={12} y={48} fill="#FCA5A5" fontSize={9}>
                        {hoveredFunnelIndex > 0 
                          ? `Drop-off: ${Math.round(100 - (funnelStages[hoveredFunnelIndex].count / funnelStages[hoveredFunnelIndex-1].count) * 100)}%`
                          : 'Drop-off: 0%'
                        }
                      </text>
                    </g>
                  )}
                </svg>
              </div>
            </Card>

            {/* Widget 3: Active Projects Progress */}
            <Card className="p-6 flex flex-col justify-between">
              <div>
                <h3 className="font-semibold text-slate-900 text-base mb-1">Active Projects Delivery</h3>
                <p className="text-xs text-slate-500 mb-4">Radial performance indicators of ongoing work</p>
              </div>
              <div className="flex justify-center items-center py-4">
                <svg viewBox="0 0 540 200" className="w-full h-auto">
                  {/* Big Circle: Avg Completion */}
                  <g>
                    <circle cx={100} cy={90} r={55} fill="none" stroke="#E2E8F0" strokeWidth={10} />
                    <circle 
                      cx={100} 
                      cy={90} 
                      r={55} 
                      fill="none" 
                      stroke="#111" 
                      strokeWidth={10} 
                      strokeDasharray={345.5} 
                      strokeDashoffset={isMounted ? 345.5 * (1 - avgProgress / 100) : 345.5} 
                      strokeLinecap="round" 
                      transform="rotate(-90 100 90)" 
                      style={{ transition: 'stroke-dashoffset 1.5s ease-in-out' }} 
                    />
                    <text x={100} y={97} textAnchor="middle" fontSize={18} fontWeight="bold" fill="#111">{Math.round(avgProgress)}%</text>
                    <text x={100} y={170} textAnchor="middle" fontSize={10} fontWeight="bold" fill="#64748B" className="uppercase tracking-wider">Avg Completion</text>
                  </g>

                  {/* Active Project Rings */}
                  {activeProjects.slice(0, 3).map((p, idx) => {
                    const cx = 250 + idx * 115;
                    const cy = 90;
                    const r = 32;
                    const circ = 201;

                    return (
                      <g key={p.id}>
                        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E2E8F0" strokeWidth={6} />
                        <circle 
                          cx={cx} 
                          cy={cy} 
                          r={r} 
                          fill="none" 
                          stroke="#475569" 
                          strokeWidth={6} 
                          strokeDasharray={circ} 
                          strokeDashoffset={isMounted ? circ * (1 - p.progress / 100) : circ} 
                          strokeLinecap="round" 
                          transform={`rotate(-90 ${cx} ${cy})`}
                          style={{ transition: 'stroke-dashoffset 1.5s ease-in-out' }} 
                        />
                        <text x={cx} y={94} textAnchor="middle" fontSize={11} fontWeight="bold" fill="#334155">{p.progress}%</text>

                    <div className="flex justify-between items-end mb-1">
                      <span className="text-lg font-bold text-slate-900">{formatINR(campaign.spent)}</span>
                      <span className="text-xs font-medium text-slate-500 mb-1">/ {formatINR(campaign.budget)}</span>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-2">
                      <div className={`h-2 rounded-full ${(campaign.spent/campaign.budget) > 0.9 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${Math.min((campaign.spent/campaign.budget)*100, 100)}%` }} />
                    </div>
                  </div>
                </div>
              </Card>
            </div>

            <div className="md:col-span-3">
              <Card className="p-6 h-full">
                <div className="flex border-b border-slate-200 mb-6">
                  {['overview', 'ad-sets', 'ab-tests', 'keywords'].map(tab => (
                    <button
                      key={tab}
                      className={`pb-3 px-4 text-sm font-medium border-b-2 transition-colors ${activeTab === tab ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
                      onClick={() => setActiveTab(tab)}
                    >
                      {tab.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}
                    </button>
                  ))}
                </div>

                {activeTab === 'overview' && (
                  <div className="space-y-6">
                    <div className="grid grid-cols-3 gap-4">
                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <p className="text-xs text-slate-500 font-medium mb-1">Total Conversions</p>
                        <p className="text-2xl font-bold text-slate-900">{campaign.adSets ? campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.conversions, 0), 0) : 0}</p>
                      </div>
                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <p className="text-xs text-slate-500 font-medium mb-1">Total Clicks</p>
                        <p className="text-2xl font-bold text-slate-900">{campaign.adSets ? campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.clicks, 0), 0).toLocaleString() : 0}</p>
                      </div>
                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <p className="text-xs text-slate-500 font-medium mb-1">Overall CTR</p>
                        <p className="text-2xl font-bold text-slate-900">
                          {(() => {
                            if (!campaign.adSets) return "0%";
                            const imp = campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.impressions, 0), 0);
                            const clk = campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.clicks, 0), 0);
                            return imp > 0 ? ((clk/imp)*100).toFixed(2) + "%" : "0%";
                          })()}
                        </p>
                      </div>
                    </div>
                    <div className="h-64 flex items-center justify-center border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                      <p className="text-sm font-medium text-slate-400 flex items-center gap-2"><BarChart3 size={16} /> Performance Chart Placeholder</p>
                    </div>
                  </div>
                )}

                {activeTab === 'ad-sets' && renderAdSets()}

                {activeTab === 'ab-tests' && (
                  <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                    <p className="text-sm font-medium text-slate-500 mb-2">AB Tests & Hooks Integration</p>
                    <p className="text-xs text-slate-400">Select an AB test to link with this campaign.</p>
                  </div>
                )}

                {activeTab === 'keywords' && (
                  <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                    <p className="text-sm font-medium text-slate-500 mb-2">Keyword Tracking</p>
                    <p className="text-xs text-slate-400">View targeted keywords and search trends.</p>
                  </div>
                )}
              </Card>
            </div>
          </div>
        </div>
      );
    }

    function ContentView({ contentItems, setContentItems }) {
      const [filter, setFilter] = useState('all');

      const filteredContent = contentItems.filter(item => {
        if (filter === 'all') return true;
        return item.status === filter;
      });

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h2 className="text-2xl font-bold text-slate-900 tracking-tight">Content Hub</h2>
              <p className="text-slate-500 text-sm mt-1">Manage content pipeline, approvals, and distribution.</p>
            </div>
            <Button><Plus size={16} className="mr-2" /> New Content</Button>
          </div>

          <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
            {['all', 'draft', 'in-review', 'approved', 'scheduled', 'published'].map(f => (
              <Button 
                key={f} 
                variant={filter === f ? 'primary' : 'outline'} 
                size="sm" 
                onClick={() => setFilter(f)}
                className="capitalize whitespace-nowrap"
              >
                {f.replace('-', ' ')}
              </Button>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 space-y-4">
              {filteredContent.map(item => (
                <Card key={item.id} className="p-4 hover:shadow-md transition-shadow group flex items-start gap-4 cursor-pointer">
                  <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 ${
                    item.status === 'published' ? 'bg-emerald-100 text-emerald-600' :
                    item.status === 'in-review' ? 'bg-amber-100 text-amber-600' :
                    item.status === 'scheduled' ? 'bg-blue-100 text-blue-600' :
                    item.status === 'approved' ? 'bg-green-100 text-green-600' :
                    'bg-slate-100 text-slate-600'
                  }`}>
                    {item.type === 'video-script' ? <Image size={20} /> : <FileText size={20} />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex justify-between items-start mb-1">
                      <h3 className="font-semibold text-slate-900 truncate pr-4">{item.title}</h3>
                      <Badge variant={
                        item.status === 'published' ? 'success' :
                        item.status === 'in-review' ? 'warning' :
                        item.status === 'scheduled' ? 'default' : 'outline'
                      } className="capitalize shrink-0">{item.status.replace('-', ' ')}</Badge>
                    </div>
                    <div className="flex items-center gap-3 text-xs text-slate-500 mt-2">
                      <span className="flex items-center gap-1"><Avatar name={item.author} className="w-4 h-4 text-[8px]" /> {item.author}</span>
                      <span className="flex items-center gap-1"><Calendar size={12} /> {formatDate(item.date)}</span>
                      <span className="capitalize px-1.5 py-0.5 bg-slate-100 rounded text-slate-600 font-medium">{item.type}</span>
                    </div>
                  </div>
                </Card>
              ))}
              {filteredContent.length === 0 && (
                <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                  <p className="text-sm font-medium text-slate-500">No content items found for this filter.</p>
                </div>
              )}
            </div>

            <div className="lg:col-span-1 space-y-6">
              <Card className="p-5">
                <h3 className="font-bold text-slate-900 mb-4 flex items-center gap-2"><CheckCircle2 size={16} className="text-blue-500" /> Approval Queue</h3>
                <div className="space-y-3">
                  {contentItems.filter(i => i.status === 'in-review').map(item => (
                    <div key={item.id} className="p-3 bg-slate-50 border border-slate-100 rounded-lg flex justify-between items-center">
                      <div className="min-w-0 flex-1 pr-3">
                        <p className="text-sm font-medium text-slate-800 truncate">{item.title}</p>
                        <p className="text-xs text-slate-500 mt-0.5">by {item.author}</p>
                      </div>
                      <Button size="sm" className="h-7 px-2 shrink-0">Review</Button>
                    </div>
                  ))}
                  {contentItems.filter(i => i.status === 'in-review').length === 0 && (
                    <p className="text-xs text-slate-500 text-center py-2">All caught up!</p>
                  )}
                </div>
              </Card>

              <Card className="p-5">
                <h3 className="font-bold text-slate-900 mb-4 flex items-center gap-2"><Lightbulb size={16} className="text-amber-500" /> Hook Library</h3>
                <div className="space-y-3">
                  {/* Assuming mockHooks is available globally in scope, since we're inside App */}
                  <div className="text-xs text-slate-500 bg-amber-50 p-3 rounded border border-amber-100 text-amber-800 font-medium">
                    "Stop wasting ad spend — here is what top brands do differently"
                  </div>
                  <div className="text-xs text-slate-500 bg-slate-50 p-3 rounded border border-slate-100">
                    "We grew this D2C brand 300% in 6 months. Here is the exact playbook."
                  </div>
                  <div className="text-xs text-slate-500 bg-slate-50 p-3 rounded border border-slate-100">
                    "5 AI tools that cut our content creation time by 70%"
                  </div>
                  <Button variant="outline" className="w-full text-xs h-8">View All Hooks</Button>
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    }

function FunnelView({ leads }) {
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');
      const [isMounted, setIsMounted] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setIsMounted(true), 100);
        return () => clearTimeout(timer);
      }, []);

      const filteredLeads = leads.filter(l => {
        if (!l.createdDate) return true;
        if (startDate && l.createdDate < startDate) return false;
        if (endDate && l.createdDate > endDate) return false;
        return true;
      });

      const totalCount = filteredLeads.length || 1;
      const qualifiedCount = filteredLeads.filter(l => ['qualified', 'proposal', 'won'].includes(l.stage)).length;
      const proposalCount = filteredLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length;
      const wonCount = filteredLeads.filter(l => l.stage === 'won').length;

      const stages = [
        { name: 'Lead', count: filteredLeads.length },
        { name: 'Qualified', count: qualifiedCount },
        { name: 'Proposal', count: proposalCount },
        { name: 'Won', count: wonCount }
      ];

      // Drop-off heatmap data
      const sources = ['web', 'referral', 'instagram', 'whatsapp', 'linkedin'];
      
      const sourceData = sources.map(source => {
        const sourceLeads = filteredLeads.filter(l => l.source === source);
        const sourceTotal = sourceLeads.length;
        const sourceQualified = sourceLeads.filter(l => ['qualified', 'proposal', 'won'].includes(l.stage)).length;
        const sourceWon = sourceLeads.filter(l => l.stage === 'won').length;
        const conversionRate = sourceTotal > 0 ? Math.round((sourceWon / sourceTotal) * 100) : 0;
        
        // Calculate drop-off percentages for heatmap
        const dropLead = sourceTotal > 0 ? ((sourceTotal - sourceQualified) / sourceTotal) * 100 : 0;
        const dropQual = sourceQualified > 0 ? ((sourceQualified - sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length) / sourceQualified) * 100 : 0;
        const dropProp = sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length > 0 ? ((sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length - sourceWon) / sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length) * 100 : 0;

        return { 
          source, 
          total: sourceTotal, 
          qualified: sourceQualified, 
          won: sourceWon, 
          rate: conversionRate,
          dropoffs: [dropLead, dropQual, dropProp]
        };
      }).filter(s => s.total > 0);

      const getHeatmapColor = (percentage) => {
        if (percentage === 0) return '#F1F5F9'; // slate-100
        if (percentage < 20) return '#BBF7D0'; // green-200
        if (percentage < 50) return '#FEF08A'; // yellow-200
        if (percentage < 75) return '#FED7AA'; // orange-200
        return '#FECACA'; // red-200
      };

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Conversion Funnel</h1>
              <p className="text-slate-500">Analyze lead progression and source performance</p>
            </div>
            <div className="flex items-center gap-2">
              <Input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-auto text-sm" />
              <span className="text-slate-400">to</span>
              <Input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-auto text-sm" />
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card className="p-6">
              <h3 className="font-bold text-slate-900 mb-6">Pipeline Velocity</h3>
              <div className="flex flex-col items-center">
                <svg width="100%" height="320" viewBox="0 0 400 320" className="overflow-visible">
                  {stages.map((stage, i) => {
                    const prevCount = i === 0 ? totalCount : stages[i-1].count;
                    const prevWidth = Math.max(40, (prevCount / totalCount) * 300);
                    const currWidth = Math.max(40, (stage.count / totalCount) * 300);
                    
                    const startY = i * 80;
                    const points = `
                      ${200 - prevWidth/2},${startY} 
                      ${200 + prevWidth/2},${startY} 
                      ${200 + currWidth/2},${startY + 60} 
                      ${200 - currWidth/2},${startY + 60}
                    `;
                    
                    const conversionFromPrev = prevCount > 0 ? Math.round((stage.count / prevCount) * 100) : 0;
                    
                    return (
                      <g key={stage.name} className="transition-all duration-1000 ease-out" style={{ opacity: isMounted ? 1 : 0, transform: `translateY(${isMounted ? 0 : 20}px)` }}>
                        <polygon 
                          points={points} 
                          fill={i === 0 ? '#F1F5F9' : i === 1 ? '#E2E8F0' : i === 2 ? '#CBD5E1' : '#94A3B8'} 
                          stroke="#FFF" 
                          strokeWidth="2"
                        />
                        <text x="200" y={startY + 35} textAnchor="middle" fill="#0F172A" fontSize="14" fontWeight="bold">
                          {stage.name} ({stage.count})
                        </text>
                        {i > 0 && (
                          <g transform={`translate(280, ${startY - 10})`}>
                            <rect width="40" height="20" rx="10" fill="#FFF" stroke="#E2E8F0" />
                            <text x="20" y="14" textAnchor="middle" fill="#64748B" fontSize="10" fontWeight="bold">{conversionFromPrev}%</text>
                          </g>
                        )}
                      </g>
                    );
                  })}
                </svg>
              </div>
            </Card>

            <Card className="p-6">
              <h3 className="font-bold text-slate-900 mb-6">Stage Drop-off Heatmap</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
                    <tr>
                      <th className="px-4 py-3 font-semibold rounded-tl-lg">Source</th>
                      <th className="px-4 py-3 font-semibold">Drop @ Lead</th>
                      <th className="px-4 py-3 font-semibold">Drop @ Qual</th>
                      <th className="px-4 py-3 font-semibold rounded-tr-lg">Drop @ Prop</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sourceData.map(source => (
                      <tr key={source.source} className="border-b border-slate-50 last:border-0">
                        <td className="px-4 py-3 font-medium capitalize">{source.source}</td>
                        {source.dropoffs.map((drop, i) => (
                          <td key={i} className="px-4 py-3">
                            <div className="w-full h-8 rounded flex items-center justify-center text-xs font-semibold" style={{ backgroundColor: getHeatmapColor(drop), color: drop > 50 ? '#7F1D1D' : '#1E293B' }}>
                              {Math.round(drop)}%
                            </div>
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="mt-6 flex items-center justify-center gap-4 text-xs text-slate-500">
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-[#BBF7D0]"></div> Low Drop</div>
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-[#FEF08A]"></div> Med Drop</div>
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-[#FECACA]"></div> High Drop</div>
              </div>
            </Card>
          </div>

          <Card className="p-0 overflow-hidden">
            <div className="p-6 border-b border-slate-100">
              <h3 className="font-bold text-slate-900">Lead Source Breakdown</h3>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
                  <tr>
                    <th className="px-6 py-4 font-semibold">Source</th>
                    <th className="px-6 py-4 font-semibold">Total Leads</th>
                    <th className="px-6 py-4 font-semibold">Qualified</th>
                    <th className="px-6 py-4 font-semibold">Won</th>
                    <th className="px-6 py-4 font-semibold">Win Rate</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {sourceData.map((data) => (
                    <tr key={data.source} className="hover:bg-slate-50 transition-colors">
                      <td className="px-6 py-4 font-semibold text-slate-900 capitalize">{data.source}</td>
                      <td className="px-6 py-4 text-slate-600">{data.total}</td>
                      <td className="px-6 py-4 text-slate-600">{data.qualified}</td>
                      <td className="px-6 py-4 font-medium text-slate-900">{data.won}</td>
                      <td className="px-6 py-4">
                        <div className="flex items-center gap-2 w-full max-w-[120px]">
                          <span className="font-semibold">{data.rate}%</span>
                          <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-slate-900 rounded-full" style={{ width: `${data.rate}%` }}></div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {sourceData.length === 0 && (
                    <tr><td colSpan={5} className="px-6 py-8 text-center text-slate-500 italic">No lead data found for the selected dates.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
