      const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
      const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

      const numToWordsLessThanThousand = (n) => {
        let str = '';
        if (n >= 100) {
          str += a[Math.floor(n / 100)] + 'Hundred ';
          n %= 100;
          if (n > 0) str += 'and ';
        }
        if (n >= 20) {
          str += b[Math.floor(n / 10)] + ' ';
          n %= 10;
        }
        if (n > 0) {
          str += a[n];
        }
        return str;
      };

      if (num === 0) return 'Zero Rupees Only';

      let words = '';
      const crore = Math.floor(num / 10000000);
      num %= 10000000;
      const lakh = Math.floor(num / 100000);
      num %= 100000;
      const thousand = Math.floor(num / 1000);
      num %= 1000;
      const remaining = num;

      if (crore > 0) {
        words += numToWordsLessThanThousand(crore) + 'Crore ';
      }
      if (lakh > 0) {
        words += numToWordsLessThanThousand(lakh) + 'Lakh ';
      }
      if (thousand > 0) {
        words += numToWordsLessThanThousand(thousand) + 'Thousand ';
      }
      if (remaining > 0) {
        words += numToWordsLessThanThousand(remaining);
      }

      return words.trim() + ' Rupees Only';
    };

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Monthly Volume Chart */}
            <LCard className="lg:col-span-2 p-6">
              <h3 className="font-semibold text-teal-900 mb-6">Monthly Volume (Liters)</h3>
              <div className="flex items-end gap-3 h-40">
                {monthlyData.map(d => (
                  <div key={d.month} className="flex-1 flex flex-col items-center gap-1">
                    <span className="text-xs font-medium text-teal-800">{d.liters}</span>
                    <div className="w-full rounded-t-md transition-all duration-700" style={{ height: `${(d.liters / maxLiters) * 130}px`, backgroundColor: d.month === 'Jun' ? '#0F766E' : '#99F6E4' }}></div>
                    <span className="text-xs text-slate-500">{d.month}</span>
                  </div>
                ))}
              </div>
            </LCard>

            {/* Deal Pipeline Snapshot */}
            <LCard className="p-6">
              <h3 className="font-semibold text-teal-900 mb-4">Deal Pipeline</h3>
              <div className="space-y-3">
                {['prospect', 'sample_given', 'follow_up', 'negotiation', 'won'].map(stage => {
                  const count = myDeals.filter(d => d.stage === stage).length;
                  const pct = Math.round((count / Math.max(myDeals.length, 1)) * 100);
                  return (
                    <div key={stage} className="space-y-1">
                      <div className="flex justify-between text-xs">
                        <span className="text-slate-600">{stageLabels[stage]}</span>
                        <span className="font-semibold text-teal-900">{count}</span>
                      </div>
                      <div className="h-1.5 bg-teal-50 rounded-full">
                        <div className={`h-full rounded-full ${stageColors[stage]}`} style={{ width: `${pct}%` }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </LCard>
          </div>

          {/* Recent Orders */}
          <LCard className="overflow-hidden">
            <div className="p-5 border-b border-teal-50">
              <h3 className="font-semibold text-teal-900">Recent Delivery Orders</h3>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-teal-50/50 text-slate-500">
                  <tr>
                    <th className="px-5 py-3 font-medium">Order ID</th>
                    <th className="px-5 py-3 font-medium">Client</th>
                    <th className="px-5 py-3 font-medium">Liters</th>
                    <th className="px-5 py-3 font-medium">Status</th>
                    <th className="px-5 py-3 font-medium">Date</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-teal-50">
                  {recentOrders.map(o => {
                    const client = clients.find(c => c.id === o.clientId);
                    return (
                      <tr key={o.id} className="hover:bg-teal-50/30 transition-colors">
                        <td className="px-5 py-3 font-semibold text-teal-800">{o.id}</td>
                        <td className="px-5 py-3 text-slate-700">{client?.name || 'Unknown'}</td>
                        <td className="px-5 py-3 font-medium">{o.totalLiters}L</td>
                        <td className="px-5 py-3">{getOrderStatusBadge(o.status)}</td>
                        <td className="px-5 py-3 text-slate-500">{o.orderDate}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </LCard>

          {/* Pending Orders alert */}
          {pendingOrders > 0 && (
            <div className="flex items-center gap-3 p-4 bg-amber-50 border border-amber-200 rounded-xl">
              <AlertCircle className="text-amber-600 shrink-0" size={20} />
              <p className="text-sm text-amber-800 font-medium">{pendingOrders} order(s) pending delivery. Assign agents to move them forward.</p>
            </div>
          )}
        </div>
      );
    }

    // ============================================================================
    // LENTONE — FIELD WORKERS (Attendance Board)
    // ============================================================================

    function LentoneFieldWorkers({ team, attendance, setAttendance, currentUser }) {
      const now = new Date().toISOString();

      const handleCheckIn = (empId) => {
        setAttendance(prev => prev.map(a =>
          a.empId === empId ? { ...a, checkIn: now, status: 'checked_in', location: 'Field' } : a
        ));
      };

      const handleCheckOut = (empId) => {
        setAttendance(prev => prev.map(a =>
          a.empId === empId ? { ...a, checkOut: now, status: 'checked_out' } : a
        ));
      };

      const formatTime = (isoStr) => {
        if (!isoStr) return '—';
        return new Date(isoStr).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
      };

      const fieldWorkers = currentUser.role === 'Field Sales Executive' || currentUser.role === 'Delivery Agent'
        ? team.filter(t => t.empId === currentUser.empId)
        : team.filter(t => t.role !== 'Super Admin' && t.role !== 'Area Manager');

      const getStatusBadge = (status) => {
        const map = { checked_in: 'success', checked_out: 'default', not_logged: 'danger' };
        const labels = { checked_in: '🟢 Checked In', checked_out: '⚪ Checked Out', not_logged: '🔴 Not Logged' };
        return <LBadge variant={map[status]}>{labels[status]}</LBadge>;
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <div>
              <h2 className="text-lg font-bold text-teal-900">Field Worker Attendance</h2>
              <p className="text-sm text-slate-500 mt-0.5">Today: {new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
            </div>
          </div>

          {/* Summary cards */}
          <div className="grid grid-cols-3 gap-4">
            {[
              { label: 'Checked In', count: attendance.filter(a => a.status === 'checked_in').length, color: 'bg-teal-50 text-teal-700' },
              { label: 'Checked Out', count: attendance.filter(a => a.status === 'checked_out').length, color: 'bg-slate-100 text-slate-700' },
              { label: 'Not Logged', count: attendance.filter(a => a.status === 'not_logged').length, color: 'bg-red-50 text-red-700' },
            ].map(s => (
              <LCard key={s.label} className={`p-4 text-center ${s.color}`}>
                <p className="text-2xl font-bold">{s.count}</p>
                <p className="text-xs font-medium mt-1">{s.label}</p>
              </LCard>
            ))}
          </div>

          <LCard className="overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-teal-50/60 text-slate-500">
                  <tr>
                    <th className="px-5 py-3 font-medium">Employee</th>
                    <th className="px-5 py-3 font-medium">Role</th>
                    <th className="px-5 py-3 font-medium">Status</th>
                    <th className="px-5 py-3 font-medium">Check-In</th>
                    <th className="px-5 py-3 font-medium">Check-Out</th>
                    <th className="px-5 py-3 font-medium">Location</th>
                    <th className="px-5 py-3 font-medium text-right">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-teal-50">
                  {fieldWorkers.map(emp => {
                    const rec = attendance.find(a => a.empId === emp.empId);
                    const canControl = currentUser.role === 'Super Admin' || currentUser.role === 'Area Manager' || currentUser.empId === emp.empId;
                    return (
                      <tr key={emp.empId} className="hover:bg-teal-50/30 transition-colors">
                        <td className="px-5 py-3">
                          <div className="flex items-center gap-3">
                            <LAvatar name={emp.initial} className="w-8 h-8 text-[10px]" />
                            <div>
                              <div className="font-semibold text-slate-900">{emp.name}</div>
                              <div className="text-xs text-slate-400">{emp.empId}</div>
                            </div>
                          </div>
                        </td>
                        <td className="px-5 py-3 text-slate-600">{emp.role}</td>
                        <td className="px-5 py-3">{getStatusBadge(rec?.status || 'not_logged')}</td>
                        <td className="px-5 py-3 font-medium text-teal-800">{formatTime(rec?.checkIn)}</td>
                        <td className="px-5 py-3 text-slate-500">{formatTime(rec?.checkOut)}</td>
                        <td className="px-5 py-3 text-slate-500 text-xs">{rec?.location || '—'}</td>
                        <td className="px-5 py-3 text-right">
                          {canControl && (
                            <div className="flex justify-end gap-2">
                              {rec?.status !== 'checked_in' && (
                                <LBtn size="sm" variant="secondary" onClick={() => handleCheckIn(emp.empId)}>Check In</LBtn>
                              )}
                              {rec?.status === 'checked_in' && (
                                <LBtn size="sm" variant="outline" onClick={() => handleCheckOut(emp.empId)}>Check Out</LBtn>
                              )}
                            </div>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </LCard>
        </div>
      );
    }

    // ============================================================================
    // LENTONE — B2B CLIENTS
    // ============================================================================

    function LentoneClients({ clients, setClients, currentUser }) {
      const [search, setSearch] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [form, setForm] = useState({ name: '', contact: '', phone: '', type: 'Hotel', address: '', products: [], monthlyQty: 0, status: 'prospect' });

      const clientTypes = ['Hotel', 'Restaurant', 'Mall', 'Educational Institution', 'Office', 'PG', 'Catering', 'Bakery'];
      const productOptions = ['Hand Wash 5L', 'Dishwash 5L', 'Floor Cleaner 5L', 'Toilet Cleaner 5L', 'Glass Cleaner 5L'];

      const visibleClients = currentUser.role === 'Field Sales Executive'
        ? clients.filter(c => c.assignedTo === currentUser.empId)
        : clients;

      const filtered = visibleClients.filter(c => {
        const matchSearch = c.name.toLowerCase().includes(search.toLowerCase()) || c.contact.toLowerCase().includes(search.toLowerCase());
        const matchType = filterType === 'all' || c.type === filterType;
        return matchSearch && matchType;
      });

      const typeColors = {
        Hotel: 'info', Restaurant: 'warning', Mall: 'lime', 'Educational Institution': 'success',
        Office: 'default', PG: 'default', Catering: 'warning', Bakery: 'lime',
      };

      const handleAdd = (e) => {
        e.preventDefault();
        setClients([...clients, { ...form, id: Date.now(), assignedTo: currentUser.empId, lastOrder: null }]);
        setIsModalOpen(false);
        setForm({ name: '', contact: '', phone: '', type: 'Hotel', address: '', products: [], monthlyQty: 0, status: 'prospect' });
      };

      const toggleProduct = (p) => {
        setForm(prev => ({
          ...prev,
          products: prev.products.includes(p) ? prev.products.filter(x => x !== p) : [...prev.products, p],
        }));
      };

      return (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
            <div className="flex gap-3 flex-1">
              <div className="relative flex-1 max-w-xs">
                <Search className="absolute left-2.5 top-2.5 text-slate-400" size={15} />
                <LInput placeholder="Search clients..." value={search} onChange={e => setSearch(e.target.value)} className="pl-8" />
              </div>
              <LSelect value={filterType} onChange={e => setFilterType(e.target.value)} className="w-44">
                <option value="all">All Types</option>
                {clientTypes.map(t => <option key={t} value={t}>{t}</option>)}
              </LSelect>
            </div>
            <LBtn onClick={() => setIsModalOpen(true)}><Plus size={16} className="mr-2" />Add Client</LBtn>
          </div>

          {/* Stats row */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {[
              { label: 'Total B2B', val: visibleClients.length },
              { label: 'Active', val: visibleClients.filter(c => c.status === 'active').length },
              { label: 'Prospects', val: visibleClients.filter(c => c.status === 'prospect').length },
              { label: 'Monthly Vol.', val: `${visibleClients.filter(c=>c.status==='active').reduce((s,c)=>s+c.monthlyQty,0)}L` },
            ].map(s => (
              <LCard key={s.label} className="p-4 text-center">
                <p className="text-xl font-bold text-teal-800">{s.val}</p>
                <p className="text-xs text-slate-500 mt-0.5">{s.label}</p>
              </LCard>
            ))}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            {filtered.map(c => (
              <LCard key={c.id} className="p-5 hover:shadow-md transition-shadow">
                <div className="flex justify-between items-start mb-3">
                  <div>
                    <h4 className="font-bold text-teal-900 text-sm leading-tight">{c.name}</h4>
                    <p className="text-xs text-slate-500 mt-0.5">{c.address}</p>
                  </div>
                  <LBadge variant={typeColors[c.type] || 'default'}>{c.type}</LBadge>
                </div>
                <div className="flex flex-wrap gap-1 mb-3">
                  {c.products.map(p => (
                    <span key={p} className="text-[10px] bg-teal-50 text-teal-700 px-2 py-0.5 rounded-full border border-teal-100">{p}</span>
                  ))}
                </div>
                <div className="flex items-center justify-between text-xs text-slate-500 border-t border-teal-50 pt-3 mt-3">
                  <span className="flex items-center gap-1"><MessageCircle size={12} />{c.phone}</span>
                  <span className="font-semibold text-teal-700">{c.monthlyQty}L/mo</span>
                </div>
                <div className="flex items-center justify-between mt-2">
                  <LBadge variant={c.status === 'active' ? 'success' : 'warning'} className="capitalize">{c.status}</LBadge>
                  <a href={`https://wa.me/${c.phone.replace(/[^\d]/g, '')}?text=Hi ${c.contact}, following up on Lentone products!`} target="_blank" rel="noreferrer">
                    <LBtn size="sm" variant="ghost" className="text-xs">
                      <MessageCircle size={12} className="mr-1" />WhatsApp
                    </LBtn>
                  </a>
                </div>
              </LCard>
            ))}
            {filtered.length === 0 && (
              <div className="col-span-3 text-center py-12 text-slate-400">
                <Users size={40} className="mx-auto mb-3 opacity-30" />
                <p>No clients found.</p>
              </div>
            )}
          </div>

          <LDialog isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Add B2B Client">
            <form onSubmit={handleAdd} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Business Name</label>
                <LInput required value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="e.g. SUNRISE HOTEL" />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Contact Person</label>
                  <LInput required value={form.contact} onChange={e => setForm({...form, contact: e.target.value})} placeholder="e.g. Mr. Ravi" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Phone</label>
                  <LInput required value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="+91 98765 XXXXX" />
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Client Type</label>
                  <LSelect value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                    {clientTypes.map(t => <option key={t} value={t}>{t}</option>)}
                  </LSelect>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Monthly Qty (Liters)</label>
                  <LInput type="number" min="0" value={form.monthlyQty} onChange={e => setForm({...form, monthlyQty: parseInt(e.target.value)||0})} />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Address</label>
                <LInput value={form.address} onChange={e => setForm({...form, address: e.target.value})} placeholder="Area, Chennai" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Products Needed</label>
                <div className="flex flex-wrap gap-2">
                  {productOptions.map(p => (
                    <button type="button" key={p} onClick={() => toggleProduct(p)}
                      className={`text-xs px-3 py-1.5 rounded-full border transition-all ${form.products.includes(p) ? 'bg-teal-600 text-white border-teal-600' : 'bg-white text-slate-600 border-slate-300 hover:border-teal-300'}`}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
              <div className="pt-3 flex justify-end gap-3">
                <LBtn type="button" variant="ghost" onClick={() => setIsModalOpen(false)}>Cancel</LBtn>
                <LBtn type="submit">Add Client</LBtn>
              </div>
            </form>
          </LDialog>
        </div>
      );
    }

    // ============================================================================
    // LENTONE — ORDERS & DELIVERIES (Kanban)
    // ============================================================================

    function LentoneOrders({ orders, setOrders, clients, team, currentUser }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [form, setForm] = useState({ clientId: '', assignedTo: '', items: [{ name: 'Hand Wash 5L', qty: 1 }] });

      const columns = [
        { id: 'pending', label: 'Pending', color: 'border-amber-400', badge: 'warning' },
        { id: 'picked_up', label: 'Picked Up', color: 'border-blue-400', badge: 'info' },
        { id: 'in_transit', label: 'In Transit', color: 'border-purple-400', badge: 'info' },
        { id: 'delivered', label: 'Delivered', color: 'border-teal-500', badge: 'success' },
      ];

      const statusFlow = { pending: 'picked_up', picked_up: 'in_transit', in_transit: 'delivered', delivered: 'delivered' };
      const nextLabel = { pending: 'Mark Picked Up', picked_up: 'Mark In Transit', in_transit: 'Mark Delivered', delivered: '✓ Done' };

      const visibleOrders = currentUser.role === 'Delivery Agent'
        ? orders.filter(o => o.assignedTo === currentUser.empId)
        : orders;

      const advance = (id) => {
        setOrders(prev => prev.map(o => o.id === id ? { ...o, status: statusFlow[o.status], deliveryDate: statusFlow[o.status] === 'delivered' ? new Date().toISOString().split('T')[0] : o.deliveryDate } : o));
      };

      const productOptions = ['Hand Wash 5L', 'Dishwash 5L', 'Floor Cleaner 5L', 'Toilet Cleaner 5L', 'Glass Cleaner 5L'];
      const deliveryAgents = team.filter(t => t.role === 'Delivery Agent');

      const updateItem = (idx, field, val) => {
        const items = form.items.map((it, i) => i === idx ? { ...it, [field]: field === 'qty' ? parseInt(val)||1 : val } : it);
        setForm({...form, items});
      };

      const handleAdd = (e) => {
        e.preventDefault();
        const totalLiters = form.items.reduce((s, it) => s + (it.qty * 5), 0);
        setOrders([...orders, {
          id: `ORD-${String(orders.length + 1).padStart(3, '0')}`,
          clientId: parseInt(form.clientId),
          products: form.items.map(it => ({ name: it.name, qty: it.qty })),
          totalLiters,
          status: 'pending',
          assignedTo: form.assignedTo,
          orderDate: new Date().toISOString().split('T')[0],
          deliveryDate: null,
        }]);
        setIsModalOpen(false);
        setForm({ clientId: '', assignedTo: '', items: [{ name: 'Hand Wash 5L', qty: 1 }] });
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <p className="text-sm text-slate-500">Drag or click to advance order status through the delivery pipeline.</p>
            {(currentUser.role === 'Super Admin' || currentUser.role === 'Area Manager') && (
              <LBtn onClick={() => setIsModalOpen(true)}><Plus size={16} className="mr-2" />New Order</LBtn>
            )}
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            {columns.map(col => {
              const colOrders = visibleOrders.filter(o => o.status === col.id);
              return (
                <div key={col.id} className="bg-slate-50 rounded-xl p-3">
                  <div className="flex justify-between items-center mb-3 px-1">
                    <h3 className="font-semibold text-sm text-slate-700">{col.label}</h3>
                    <LBadge variant={col.badge} className="text-[10px]">{colOrders.length}</LBadge>
                  </div>
                  <div className="space-y-3 min-h-[100px]">
                    {colOrders.map(o => {
                      const client = clients.find(c => c.id === o.clientId);
                      const agent = team.find(t => t.empId === o.assignedTo);
                      return (
                        <div key={o.id} className={`bg-white rounded-lg p-3 border-l-4 ${col.color} shadow-sm`}>
                          <div className="font-semibold text-xs text-teal-900 mb-1">{o.id}</div>
                          <div className="text-sm font-medium text-slate-800 mb-1">{client?.name || 'Unknown'}</div>
                          <div className="flex flex-wrap gap-1 mb-2">
                            {o.products.map((p, i) => (
                              <span key={i} className="text-[9px] bg-teal-50 text-teal-600 px-1.5 py-0.5 rounded-full">{p.qty}× {p.name}</span>
                            ))}
                          </div>
                          <div className="flex justify-between items-center text-xs text-slate-500 mb-2">
                            <span className="font-semibold text-teal-700">{o.totalLiters}L</span>
                            <span>{agent?.name || '—'}</span>
                          </div>
                          {col.id !== 'delivered' && (
                            <LBtn size="sm" variant="secondary" onClick={() => advance(o.id)} className="w-full text-[10px] h-7">
                              {nextLabel[col.id]}
                            </LBtn>
                          )}
                          {col.id === 'delivered' && (
                            <div className="text-[10px] text-teal-600 font-medium text-center">✓ Delivered {o.deliveryDate}</div>
                          )}
                        </div>
                      );
                    })}
                    {colOrders.length === 0 && (
                      <div className="text-center py-6 text-xs text-slate-400 italic">No orders</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          <LDialog isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Create New Order" maxWidth="max-w-xl">
            <form onSubmit={handleAdd} className="space-y-4">
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Client</label>
                  <LSelect required value={form.clientId} onChange={e => setForm({...form, clientId: e.target.value})}>
                    <option value="">-- Select Client --</option>
                    {clients.filter(c => c.status === 'active').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </LSelect>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Delivery Agent</label>
                  <LSelect required value={form.assignedTo} onChange={e => setForm({...form, assignedTo: e.target.value})}>
                    <option value="">-- Assign Agent --</option>
                    {deliveryAgents.map(a => <option key={a.empId} value={a.empId}>{a.name}</option>)}
                  </LSelect>
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Products</label>
                {form.items.map((it, idx) => (
                  <div key={idx} className="flex gap-2 mb-2 items-center">
                    <LSelect value={it.name} onChange={e => updateItem(idx, 'name', e.target.value)} className="flex-1">
                      {productOptions.map(p => <option key={p} value={p}>{p}</option>)}
                    </LSelect>
                    <LInput type="number" min="1" value={it.qty} onChange={e => updateItem(idx, 'qty', e.target.value)} className="w-16 text-center" />
                    <span className="text-xs text-slate-500 w-12">{it.qty * 5}L</span>
                    <button type="button" onClick={() => setForm({...form, items: form.items.filter((_,i)=>i!==idx)})} disabled={form.items.length===1} className="text-slate-300 hover:text-red-500 disabled:opacity-30"><Trash2 size={14}/></button>
                  </div>
                ))}
                <LBtn type="button" variant="ghost" size="sm" onClick={() => setForm({...form, items: [...form.items, {name:'Hand Wash 5L', qty:1}]})}>
                  <Plus size={13} className="mr-1" />Add Product
                </LBtn>
              </div>
              <div className="pt-3 flex justify-end gap-3">
                <LBtn type="button" variant="ghost" onClick={() => setIsModalOpen(false)}>Cancel</LBtn>
                <LBtn type="submit">Create Order</LBtn>
              </div>
            </form>
          </LDialog>
        </div>
      );
    }

    // ============================================================================
    // LENTONE — DEALS PIPELINE
    // ============================================================================

    function LentoneDeals({ deals, setDeals, clients, currentUser }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [form, setForm] = useState({ clientId: '', title: '', liters: 0, value: 0, notes: '' });

      const stages = [
        { id: 'prospect', label: 'Prospect', color: 'border-slate-400', bg: 'bg-slate-50' },
        { id: 'sample_given', label: 'Sample Given', color: 'border-blue-400', bg: 'bg-blue-50' },
        { id: 'follow_up', label: 'Follow-up', color: 'border-amber-400', bg: 'bg-amber-50' },
        { id: 'negotiation', label: 'Negotiation', color: 'border-orange-500', bg: 'bg-orange-50' },
        { id: 'won', label: '✅ Closed Won', color: 'border-teal-500', bg: 'bg-teal-50' },
        { id: 'lost', label: '❌ Lost', color: 'border-red-400', bg: 'bg-red-50' },
      ];

      const stageFlow = { prospect: 'sample_given', sample_given: 'follow_up', follow_up: 'negotiation', negotiation: 'won' };
      const nextLabel = { prospect: 'Give Sample', sample_given: 'Mark Follow-up', follow_up: 'Negotiate', negotiation: 'Close Won!' };

      const visibleDeals = currentUser.role === 'Field Sales Executive'
        ? deals.filter(d => d.assignedTo === currentUser.empId)
        : deals;

      const handleDragStart = (e, id) => e.dataTransfer.setData('dealId', id);
      const handleDrop = (e, stageId) => {
        e.preventDefault();
        const id = parseInt(e.dataTransfer.getData('dealId'));
        setDeals(prev => prev.map(d => d.id === id ? { ...d, stage: stageId } : d));
      };

      const advance = (id) => {
        setDeals(prev => prev.map(d => {
          if (d.id !== id) return d;
          const next = stageFlow[d.stage];
          return next ? { ...d, stage: next, closedDate: next === 'won' ? new Date().toISOString().split('T')[0] : d.closedDate } : d;
        }));
      };

      const markLost = (id) => {
        if (confirm('Mark this deal as lost?')) setDeals(prev => prev.map(d => d.id === id ? {...d, stage:'lost'} : d));
      };

      const handleAdd = (e) => {
        e.preventDefault();
        setDeals([...deals, {
          id: Date.now(),
          clientId: parseInt(form.clientId),
          title: form.title,
          stage: 'prospect',
          liters: parseInt(form.liters)||0,
          value: parseInt(form.value)||0,
          assignedTo: currentUser.empId,
          notes: form.notes,
        }]);
        setIsModalOpen(false);
        setForm({ clientId: '', title: '', liters: 0, value: 0, notes: '' });
      };

      const totalWonLiters = visibleDeals.filter(d => d.stage === 'won').reduce((s,d) => s+d.liters, 0);
      const totalWonValue = visibleDeals.filter(d => d.stage === 'won').reduce((s,d) => s+d.value, 0);

      return (
        <div className="space-y-5">
          <div className="flex justify-between items-center">
            <div className="flex gap-4 text-sm">
              <span className="font-semibold text-teal-800">Won: {totalWonLiters}L</span>
              <span className="text-slate-500">|</span>
              <span className="font-semibold text-teal-800">{formatINR(totalWonValue)}</span>
            </div>
            <LBtn onClick={() => setIsModalOpen(true)}><Plus size={16} className="mr-2" />Add Deal</LBtn>
          </div>

          <div className="flex gap-3 overflow-x-auto pb-3 custom-scrollbar">
            {stages.map(stage => {
              const stageDeals = visibleDeals.filter(d => d.stage === stage.id);
              return (
                <div key={stage.id} className="flex-shrink-0 w-60 rounded-xl bg-slate-100/70 p-3"
                  onDragOver={e => e.preventDefault()} onDrop={e => handleDrop(e, stage.id)}>
                  <div className="flex justify-between items-center mb-3 px-1">
                    <h3 className="font-semibold text-xs text-slate-700">{stage.label}</h3>
                    <span className="bg-white text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-semibold border border-slate-200">{stageDeals.length}</span>
                  </div>
                  <div className="space-y-2 min-h-[80px]">
                    {stageDeals.map(deal => {
                      const client = clients.find(c => c.id === deal.clientId);
                      return (
                        <div key={deal.id} className={`bg-white rounded-lg p-3 border-l-4 ${stage.color} shadow-sm cursor-grab active:cursor-grabbing`}
                          draggable onDragStart={e => handleDragStart(e, deal.id)}>
                          <div className="text-sm font-bold text-slate-900 mb-1 leading-tight">{client?.name || 'Unknown'}</div>
                          <div className="text-xs text-slate-500 mb-2 line-clamp-2">{deal.title}</div>
                          <div className="flex justify-between text-xs mb-2">
                            <span className="font-semibold text-teal-700">{deal.liters}L</span>
                            <span className="font-semibold text-slate-700">{formatINR(deal.value)}</span>
                          </div>
                          {deal.notes && <div className="text-[10px] text-slate-400 italic mb-2 line-clamp-1">{deal.notes}</div>}
                          {stage.id === 'won' ? (
                            <div className="text-[10px] text-teal-600 font-semibold text-center">🎉 Closed {deal.closedDate}</div>
                          ) : stage.id === 'lost' ? (
                            <div className="text-[10px] text-red-500 font-semibold text-center">Deal Lost</div>
                          ) : (
                            <div className="flex gap-1 mt-1">
                              {stageFlow[stage.id] && (
                                <LBtn size="sm" variant="secondary" onClick={() => advance(deal.id)} className="flex-1 text-[10px] h-6 px-1">{nextLabel[stage.id]}</LBtn>
                              )}
                              <LBtn size="sm" variant="danger" onClick={() => markLost(deal.id)} className="h-6 px-2 text-[10px]">✕</LBtn>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {stageDeals.length === 0 && <div className="text-center py-4 text-xs text-slate-400 italic">Empty</div>}
                  </div>
                </div>
              );
            })}
          </div>

          <LDialog isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Add New Deal">
            <form onSubmit={handleAdd} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Client</label>
                <LSelect required value={form.clientId} onChange={e => setForm({...form, clientId: e.target.value})}>
                  <option value="">-- Select Client --</option>
                  {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </LSelect>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Deal Title</label>
                <LInput required value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="e.g. Monthly Dishwash Supply" />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Expected Liters/mo</label>
                  <LInput type="number" min="0" value={form.liters} onChange={e => setForm({...form, liters: e.target.value})} />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Deal Value (₹)</label>
                  <LInput type="number" min="0" value={form.value} onChange={e => setForm({...form, value: e.target.value})} />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Notes</label>
                <LInput value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} placeholder="e.g. Sample given, awaiting feedback..." />
              </div>
              <div className="pt-3 flex justify-end gap-3">
                <LBtn type="button" variant="ghost" onClick={() => setIsModalOpen(false)}>Cancel</LBtn>
                <LBtn type="submit">Create Deal</LBtn>
              </div>
            </form>
          </LDialog>
        </div>
      );
    }

    // ============================================================================
    // LENTONE — REPORTS (Admin / Area Manager only)
    // ============================================================================

    function LentoneReports({ deals, orders, clients, team }) {
      const closedDeals = deals.filter(d => d.stage === 'won');
      const totalLitersWon = closedDeals.reduce((s,d) => s+d.liters, 0);
      const totalRevWon = closedDeals.reduce((s,d) => s+d.value, 0);
      const deliveredOrders = orders.filter(o => o.status === 'delivered');
      const deliveryRate = orders.length > 0 ? Math.round((deliveredOrders.length / orders.length) * 100) : 0;

      // Performance by executive
      const executives = team.filter(t => t.role === 'Field Sales Executive');
      const perfData = executives.map(ex => {
        const myDeals = closedDeals.filter(d => d.assignedTo === ex.empId);
        const myLiters = myDeals.reduce((s,d) => s+d.liters, 0);
        return { name: ex.name, deals: myDeals.length, liters: myLiters, value: myDeals.reduce((s,d)=>s+d.value,0) };
      }).sort((a,b) => b.liters - a.liters);

      const maxLiters = Math.max(...perfData.map(p => p.liters), 1);

      // Client type breakdown
      const typeGroups = {};
      clients.filter(c=>c.status==='active').forEach(c => {
        typeGroups[c.type] = (typeGroups[c.type] || 0) + 1;
      });

      // Product popularity
      const productCount = {};
      clients.filter(c=>c.status==='active').forEach(c => {
        c.products.forEach(p => { productCount[p] = (productCount[p]||0) + 1; });
      });

      return (
        <div className="space-y-6">
          {/* Top KPIs */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <LCard className="p-5 bg-gradient-to-br from-teal-600 to-teal-800 text-white border-teal-700">
              <p className="text-teal-200 text-xs font-medium mb-1">Total Liters Won</p>
              <p className="text-3xl font-bold">{totalLitersWon}L</p>
            </LCard>
            <LCard className="p-5 bg-gradient-to-br from-lime-600 to-lime-700 text-white border-lime-700">
              <p className="text-lime-200 text-xs font-medium mb-1">Total Revenue</p>
              <p className="text-2xl font-bold">{formatINR(totalRevWon)}</p>
            </LCard>
            <LCard className="p-5">
              <p className="text-slate-500 text-xs font-medium mb-1">Deals Closed</p>
              <p className="text-3xl font-bold text-teal-900">{closedDeals.length}</p>
            </LCard>
            <LCard className="p-5">
              <p className="text-slate-500 text-xs font-medium mb-1">Delivery Success Rate</p>
              <p className="text-3xl font-bold text-teal-900">{deliveryRate}%</p>
            </LCard>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* Executive Performance */}
            <LCard className="p-6">
              <h3 className="font-bold text-teal-900 mb-5">Field Executive Performance</h3>
              <div className="space-y-4">
                {perfData.map((p, i) => (
                  <div key={p.name}>
                    <div className="flex justify-between items-center mb-1">
                      <div className="flex items-center gap-2">
                        <span className={`text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center ${i===0?'bg-teal-600 text-white':'bg-slate-100 text-slate-600'}`}>{i+1}</span>
                        <span className="text-sm font-semibold text-slate-800">{p.name}</span>
                      </div>
                      <div className="text-right text-xs">
                        <span className="font-bold text-teal-700">{p.liters}L</span>
                        <span className="text-slate-400 ml-2">{p.deals} deals</span>
                      </div>
                    </div>
                    <div className="h-2 bg-teal-50 rounded-full">
                      <div className="h-full bg-teal-500 rounded-full transition-all duration-700" style={{width:`${(p.liters/maxLiters)*100}%`}}></div>
                    </div>
                  </div>
                ))}
                {perfData.length === 0 && <p className="text-sm text-slate-400 italic">No data.</p>}
              </div>
            </LCard>

            {/* Client Type Mix */}
            <LCard className="p-6">
              <h3 className="font-bold text-teal-900 mb-5">Client Type Mix</h3>
              <div className="space-y-3">
                {Object.entries(typeGroups).sort((a,b)=>b[1]-a[1]).map(([type, count]) => {
                  const total = Object.values(typeGroups).reduce((s,v)=>s+v,0);
                  const pct = Math.round((count/total)*100);
                  return (
                    <div key={type}>
                      <div className="flex justify-between text-sm mb-1">
                        <span className="text-slate-700">{type}</span>
                        <span className="font-semibold text-teal-800">{count} ({pct}%)</span>
                      </div>
                      <div className="h-1.5 bg-teal-50 rounded-full">
                        <div className="h-full bg-gradient-to-r from-teal-400 to-lime-400 rounded-full" style={{width:`${pct}%`}}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </LCard>
          </div>

          {/* Product Popularity */}
          <LCard className="p-6">
            <h3 className="font-bold text-teal-900 mb-5">Product Popularity (Active Clients Using)</h3>
            <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
              {Object.entries(productCount).sort((a,b)=>b[1]-a[1]).map(([prod, cnt]) => (
                <div key={prod} className="bg-teal-50 rounded-xl p-4 text-center border border-teal-100">
                  <p className="text-2xl font-bold text-teal-700">{cnt}</p>
                  <p className="text-xs text-slate-600 mt-1 leading-tight">{prod}</p>
                </div>
              ))}
            </div>
          </LCard>

          {/* Deals table */}
          <LCard className="overflow-hidden">
            <div className="p-5 border-b border-teal-50">
              <h3 className="font-bold text-teal-900">Closed Deals Log</h3>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-teal-50/50 text-slate-500">
                  <tr>
                    <th className="px-5 py-3 font-medium">Client</th>
                    <th className="px-5 py-3 font-medium">Deal</th>
                    <th className="px-5 py-3 font-medium">Liters</th>
                    <th className="px-5 py-3 font-medium">Value</th>
                    <th className="px-5 py-3 font-medium">Closed By</th>
                    <th className="px-5 py-3 font-medium">Date</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-teal-50">
                  {closedDeals.map(d => {
                    const client = clients.find(c => c.id === d.clientId);
                    const exec = team.find(t => t.empId === d.assignedTo);
                    return (
                      <tr key={d.id} className="hover:bg-teal-50/20 transition-colors">
                        <td className="px-5 py-3 font-semibold text-teal-900">{client?.name}</td>
                        <td className="px-5 py-3 text-slate-600">{d.title}</td>
                        <td className="px-5 py-3 font-semibold">{d.liters}L</td>
                        <td className="px-5 py-3 font-semibold">{formatINR(d.value)}</td>
                        <td className="px-5 py-3 text-slate-600">{exec?.name}</td>
                        <td className="px-5 py-3 text-slate-500">{d.closedDate || '—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </LCard>
        </div>
      );
    }

    // ============================================================================
    // LENTONE — MAIN APP SHELL
    // ============================================================================

    function LentoneApp({ user, onLogout }) {
      const [route, setRoute] = useState('dashboard');
      const [isMobileOpen, setIsMobileOpen] = useState(false);

      // Shared state
      const [lClients, setLClients] = useState(mockLentoneClients);

        { id: 'orders', label: 'Orders & Delivery', icon: CheckSquare },
        { id: 'deals', label: 'Deals Pipeline', icon: Target },
        { id: 'reports', label: 'Reports', icon: BarChart3 },

        { id: 'field_workers', label: 'My Check-In', icon: Clock },
        { id: 'clients', label: 'My Clients', icon: Briefcase },
        { id: 'deals', label: 'My Deals', icon: Target },
      ] : [
        { id: 'dashboard', label: 'My Dashboard', icon: Home },
        { id: 'field_workers', label: 'My Check-In', icon: Clock },
        { id: 'orders', label: 'My Deliveries', icon: CheckSquare },

      const renderView = () => {
        switch (route) {
          case 'dashboard': return <LentoneDashboard currentUser={user} orders={lOrders} deals={lDeals} clients={lClients} attendance={lAttendance} team={mockLentoneTeam} />;
          case 'field_workers': return <LentoneFieldWorkers team={mockLentoneTeam} attendance={lAttendance} setAttendance={setLAttendance} currentUser={user} />;

              <button key={item.id} onClick={() => { setRoute(item.id); setIsMobileOpen(false); }}
                className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${route === item.id ? 'bg-teal-700 text-white' : 'text-teal-100 hover:bg-teal-800/60'}`}>
                <item.icon className="mr-3" size={17} />
                {item.label}
              </button>
            ))}
          </div>
          <div className="p-4 border-t border-teal-800">
            <div className="flex items-center gap-3 mb-3">
              <LAvatar name={user.initial} className="w-9 h-9 text-xs" />
              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold text-white truncate">{user.name}</div>
                <div className={`text-[10px] px-2 py-0.5 rounded-full text-white font-bold inline-block mt-0.5 ${roleBadgeColor[user.role]}`}>{user.role}</div>

            <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 px-3 py-2 text-sm text-teal-200 hover:text-white hover:bg-teal-800/60 rounded-lg transition-colors">
              <LogOut size={15} />Logout
            </button>
          </div>
        </>
      );

      return (
        <div className="flex h-screen overflow-hidden font-sans" style={{ background: LT_BG }}>
          {/* Desktop Sidebar */}
          <aside className="hidden md:flex w-60 flex-col z-20" style={{ background: '#0D4A44' }}>
            <div className="h-16 flex items-center px-5 border-b border-teal-800 shrink-0">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center mr-3 shrink-0" style={{ background: '#14B8A6' }}>
                <span className="text-white font-black text-sm">L</span>
              </div>
              <div>
                <div className="text-white font-bold text-sm leading-tight">LENTONE</div>
                <div className="text-teal-400 text-[10px] font-medium tracking-wide">Consumer Products</div>
              </div>
            </div>
            <SidebarContent />
          </aside>

          {/* Mobile drawer backdrop */}
          {isMobileOpen && <div className="md:hidden fixed inset-0 z-40 bg-teal-900/50" onClick={() => setIsMobileOpen(false)} />}
          <aside className={`md:hidden fixed inset-y-0 left-0 z-50 w-60 flex flex-col transform transition-transform duration-300 ${isMobileOpen ? 'translate-x-0' : '-translate-x-full'}`} style={{ background: '#0D4A44' }}>

              <div className="text-white font-bold">LENTONE CRM</div>
              <button onClick={() => setIsMobileOpen(false)} className="text-teal-300"><X size={20} /></button>
            </div>
            <SidebarContent />

          {/* Main content */}
          <main className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="h-16 bg-white border-b border-teal-100 flex items-center justify-between px-4 md:px-7 shrink-0 shadow-sm">

                <span className={`hidden sm:inline text-[11px] font-bold px-3 py-1 rounded-full text-white ${roleBadgeColor[user.role]}`}>{user.role}</span>
                <LAvatar name={user.initial} className="w-8 h-8 text-[10px] md:hidden" />
                <button onClick={onLogout} className="md:hidden text-teal-500 hover:text-red-500"><LogOut size={18} /></button>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-7 custom-scrollbar">
              <div className="max-w-6xl mx-auto pb-10">
                {renderView()}
              </div>
            </div>
          </main>
        </div>
      );
    }

    // ============================================================================
    // END LENTONE MODULE

        if (selectedCampaignId) return <CampaignDetailView campaignId={selectedCampaignId} campaigns={campaigns} setCampaigns={setCampaigns} clients={clients} onBack={() => setSelectedCampaignId(null)} />;
        
        switch (currentRoute) {
          case 'dashboard': return <DashboardView invoices={invoices} leads={leads} tasks={tasks} setTasks={setTasks} />;
          case 'leads': return <LeadsView leads={leads} setLeads={setLeads} />;
          case 'clients': return <ClientsView clients={clients} setClients={setClients} />;
          case 'quotes': return <QuotesView quotes={quotes} setQuotes={setQuotes} clients={clients} onSelectQuote={setSelectedQuoteId} />;
          case 'invoices': return <InvoicesView invoices={invoices} clients={clients} onSelectInvoice={setSelectedInvoiceId} />;
          case 'projects': return <ProjectsView projects={projects} setProjects={setProjects} clients={clients} onSelectProject={setSelectedProjectId} />;
          case 'tasks': return <TasksView tasks={tasks} setTasks={setTasks} />;
          case 'reports': return <ReportsView invoices={invoices} leads={leads} projects={projects} quotes={quotes} />;
          case 'funnel': return <FunnelView leads={leads} />;
          case 'team': return <ComingSoonView title="Team Management" />;
          case 'campaigns': return <CampaignsView campaigns={campaigns} setCampaigns={setCampaigns} clients={clients} onSelectCampaign={setSelectedCampaignId} />;
          case 'content': return <ContentView contentItems={contentItems} setContentItems={setContentItems} />;
          case 'assets': return <ComingSoonView title="Asset Library" />;
          case 'retention': return <ComingSoonView title="Client Retention" />;
          case 'automation': return <ComingSoonView title="Automation Engine" />;
          default: return <DashboardView invoices={invoices} leads={leads} tasks={tasks} setTasks={setTasks} />;
        }
      };

      // Search functionality
      const getSearchResults = () => {
        if (!searchQuery.trim()) return [];
        const q = searchQuery.toLowerCase();
        const results = [];
        clients.filter(c => c.company.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)).slice(0, 3).forEach(c => results.push({ type: 'Client', label: c.company, sub: c.name, route: 'clients' }));
        leads.filter(l => l.name.toLowerCase().includes(q)).slice(0, 3).forEach(l => results.push({ type: 'Lead', label: l.name, sub: l.stage, route: 'leads' }));
        quotes.filter(qx => `QT-${qx.id}`.toLowerCase().includes(q)).slice(0, 3).forEach(qx => results.push({ type: 'Quote', label: `QT-${qx.id}`, sub: formatINR(qx.total), route: 'quotes' }));
        invoices.filter(inv => `INV-${inv.id}`.toLowerCase().includes(q)).slice(0, 3).forEach(inv => results.push({ type: 'Invoice', label: `INV-${inv.id}`, sub: formatINR(inv.total), route: 'invoices' }));
        return results;
      };
      const searchResults = getSearchResults();

      // Render sidebar nav groups
      const renderNavGroups = (isMobile = false) => (
        <div className={`${isMobile ? 'p-4 space-y-3' : 'p-3 flex-1 overflow-y-auto space-y-3 custom-scrollbar'}`}>
          {navGroups.map(group => (
            <div key={group.label}>
              <div className="px-3 mb-1">
                <span className="text-[10px] uppercase tracking-widest font-bold text-slate-400">{group.label}</span>
              </div>
              <div className="space-y-0.5">
                {group.items.map(item => (
                  <button key={item.id} onClick={() => navigate(item.id)}
                    className={`w-full flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors ${
                      currentRoute === item.id ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
                    }`}>
                    <item.icon className={`mr-3 ${currentRoute === item.id ? 'text-slate-900' : 'text-slate-400'}`} size={18} />
                    {item.label}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      );

      return (
        <div className="flex h-screen bg-[#F8FAFC] font-sans text-slate-900 overflow-hidden">
          {/* SIDEBAR (Desktop) */}
          <aside className="hidden md:flex w-64 bg-white border-r border-slate-200 flex-col z-20 no-print">
            <div className="h-16 flex items-center px-6 border-b border-slate-100">
              <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center mr-3">
                <span className="text-white font-bold text-lg">T</span>
              </div>
              <span className="font-bold text-lg tracking-tight">TAGVERSE</span>
            </div>
            {renderNavGroups()}
            <div className="p-4 border-t border-slate-100">
              <div className="flex items-center px-2 justify-between">
                <div className="flex items-center overflow-hidden">
                  <Avatar name={currentUser.initial} className="w-8 h-8 mr-3 shrink-0" />
                  <div className="flex-1 overflow-hidden">
                    <div className="text-sm font-medium truncate">{currentUser.name}</div>
                    <div className="text-[10px] uppercase tracking-wider font-semibold text-slate-500 truncate">{currentUser.role}</div>
                  </div>
                </div>
                <button onClick={handleLogout} className="text-slate-400 hover:text-red-600 p-2 shrink-0 transition-colors font-medium" title="Logout">
                  <LogOut size={16} />
                </button>
              </div>
            </div>
          </aside>

          {/* MOBILE SHELL */}
          <div className="md:hidden fixed inset-0 z-40 bg-slate-900/50 backdrop-blur-sm no-print" style={{ display: isMobileMenuOpen ? 'block' : 'none' }} onClick={() => setIsMobileMenuOpen(false)} />
          <aside className={`md:hidden fixed inset-y-0 left-0 z-50 w-64 bg-white transform transition-transform duration-300 ease-in-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} no-print`}>
            <div className="h-16 flex items-center justify-between px-6 border-b border-slate-100">
              <span className="font-bold text-lg">TAGVERSE</span>
              <button onClick={() => setIsMobileMenuOpen(false)}><X size={20}/></button>
            </div>
            {renderNavGroups(true)}
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 flex flex-col h-screen overflow-hidden">
            {/* TOPBAR */}
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 shrink-0 no-print">
              <div className="flex items-center">
                <button className="md:hidden mr-4 text-slate-600" onClick={() => setIsMobileMenuOpen(true)}>
                  <Menu size={24} />
                </button>
                <h1 className="text-xl font-semibold capitalize text-slate-900">
                  {selectedInvoiceId ? 'Invoice Detail' : selectedQuoteId ? 'Quotation Detail' : currentRoute.replace('_', ' ')}
                </h1>
              </div>
              <div className="flex items-center gap-4">
                <div className="relative hidden md:block">
                  <Search className="absolute left-2.5 top-2.5 text-slate-400 z-10" size={16} />
                  <Input 
                    placeholder="Search..." 
                    className="pl-9 w-64 bg-slate-50 border-transparent" 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    onBlur={() => setTimeout(() => setSearchQuery(''), 200)}
                  />
                  {searchResults.length > 0 && (
                    <div className="absolute top-11 left-0 w-80 bg-white border border-slate-200 rounded-xl shadow-xl z-50 overflow-hidden">
                      {searchResults.map((r, idx) => (
                        <button key={idx} className="w-full text-left px-4 py-3 hover:bg-slate-50 flex items-center justify-between border-b border-slate-100 last:border-0 transition-colors"
                          onMouseDown={() => { navigate(r.route); setSearchQuery(''); }}>
                          <div>
                            <span className="text-sm font-semibold text-slate-900">{r.label}</span>
                            <span className="text-xs text-slate-500 ml-2">{r.sub}</span>
                          </div>
                          <Badge variant="default" className="text-[10px]">{r.type}</Badge>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <button className="text-slate-400 hover:text-slate-600" onClick={() => alert("Settings configuration coming soon")} title="Settings">
                  <Settings size={20} />
                </button>
                <div className="md:hidden flex items-center gap-3">
                  <Avatar name={currentUser.initial} className="w-8 h-8" />
                  <button onClick={handleLogout} className="text-slate-400 hover:text-red-500">
                    <LogOut size={18} />
                  </button>
                </div>
              </div>
            </header>

            {/* PAGE CONTENT */}
            <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
              <div className="max-w-6xl mx-auto pb-12">
                {renderView()}
              </div>
            </div>
          </main>
        </div>
      );
    }

    // ============================================================================
    // 4. DASHBOARD PAGE
    // ============================================================================

    function DashboardView({ invoices, leads, tasks, setTasks }) {
      const collected = invoices.filter(i => i.status === 'paid').reduce((sum, i) => sum + i.total, 0);
      const outstanding = invoices.filter(i => i.status === 'pending' || i.status === 'overdue').reduce((sum, i) => sum + i.total, 0);
      const openLeads = leads.filter(l => l.stage !== 'lost' && l.stage !== 'won').length;
      
      const todayTasks = tasks.filter(t => t.dueDate === TODAY);

      const toggleTask = (id) => {
        const updated = tasks.map(t => t.id === id ? { ...t, status: t.status === 'done' ? 'todo' : 'done' } : t);
        setTasks(updated);
      };

      const getStatusBadge = (status) => {
        const map = { paid: 'success', pending: 'warning', overdue: 'danger' };
        return <Badge variant={map[status] || 'default'} className="uppercase text-[10px]">{status}</Badge>;
      };

      return (
        <div className="space-y-6">
          {/* Metric Cards */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <MetricCard title="Revenue Collected" value={formatINR(collected)} icon={DollarSign} />
            <MetricCard title="Outstanding Bills" value={formatINR(outstanding)} icon={AlertCircle} />
            <MetricCard title="Open Leads" value={openLeads} icon={Users} />
            <MetricCard title="Tasks Due Today" value={todayTasks.length} icon={Clock} />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Pipeline Bars */}
            <Card className="lg:col-span-1 p-6 flex flex-col">
              <h3 className="font-semibold text-slate-900 mb-6">Sales Pipeline</h3>
              <div className="space-y-5 flex-1">
                {['lead', 'qualified', 'proposal', 'won'].map(stage => {
                  const count = leads.filter(l => l.stage === stage).length;
                  const percent = Math.round((count / Math.max(leads.length, 1)) * 100);
                  return (
                    <div key={stage} className="space-y-2">
                      <div className="flex justify-between text-sm">
                        <span className="capitalize font-medium text-slate-700">{stage}</span>
                        <span className="text-slate-500">{count}</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-2">
                        <div className="bg-slate-900 h-2 rounded-full transition-all duration-500" style={{ width: `${percent}%` }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>

            {/* Recent Invoices */}
            <Card className="lg:col-span-2 p-0 overflow-hidden flex flex-col">
              <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 className="font-semibold text-slate-900">Recent Invoices</h3>
                <Button variant="ghost" size="sm">View All</Button>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="bg-slate-50 text-slate-500">
                    <tr>
                      <th className="px-6 py-3 font-medium">Invoice</th>
                      <th className="px-6 py-3 font-medium">Amount</th>
                      <th className="px-6 py-3 font-medium">Status</th>
                      <th className="px-6 py-3 font-medium">Due Date</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {invoices.map(inv => (
                      <tr key={inv.id} className="hover:bg-slate-50/50">
                        <td className="px-6 py-4 font-semibold text-slate-900">INV-{inv.id}</td>
                        <td className="px-6 py-4 text-slate-700 font-medium">{formatINR(inv.total)}</td>
                        <td className="px-6 py-4">{getStatusBadge(inv.status)}</td>
                        <td className="px-6 py-4 text-slate-500">{formatDate(inv.dueDate)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          </div>

          {/* Today's Tasks */}
          <Card className="p-6">
            <h3 className="font-semibold text-slate-900 mb-4 flex items-center">
              <CheckSquare className="mr-2 text-slate-400" size={18} /> Today's Tasks
            </h3>
            <div className="space-y-3">
              {todayTasks.map(task => (
                <div key={task.id} className={`flex items-center p-3 rounded-lg border ${task.status === 'done' ? 'bg-slate-50 border-transparent opacity-60' : 'bg-white border-slate-200'}`}>
                  <button 
                    onClick={() => toggleTask(task.id)}
                    className={`w-5 h-5 rounded border flex items-center justify-center mr-3 transition-colors ${task.status === 'done' ? 'bg-slate-900 border-slate-900 text-white' : 'border-slate-300 text-transparent'}`}
                  >
                    <Check size={14} />
                  </button>
                  <span className={`text-sm flex-1 ${task.status === 'done' ? 'line-through text-slate-500' : 'text-slate-900 font-medium'}`}>{task.title}</span>
                  <Avatar name={task.assignee} className="w-6 h-6 text-[10px]" />
                </div>
              ))}
              {todayTasks.length === 0 && <p className="text-sm text-slate-500 italic">No tasks due today.</p>}
            </div>
          </Card>
        </div>
      );
    }

    function MetricCard({ title, value, icon: Icon }) {
      return (
        <Card className="p-6 flex flex-col justify-between">
          <div className="flex justify-between items-start mb-4">
            <p className="text-sm font-medium text-slate-500">{title}</p>
            <div className="p-2 bg-slate-50 rounded-lg text-slate-600"><Icon size={18} /></div>
          </div>
          <p className="text-2xl font-bold text-slate-900">{value}</p>
        </Card>
      );
    }

    // ============================================================================
    // 5. LEADS PAGE (Kanban)
    // ============================================================================

    function LeadsView({ leads, setLeads }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [form, setForm] = useState({ name: '', source: 'web', score: 50 });
      const columns = ['lead', 'qualified', 'proposal', 'won', 'lost'];

      const handleDragStart = (e, id) => {
        e.dataTransfer.setData('leadId', id);
      };

      const handleDrop = (e, stage) => {
        e.preventDefault();
        const id = parseInt(e.dataTransfer.getData('leadId'));
        setLeads(leads.map(l => l.id === id ? { ...l, stage } : l));
      };

      const handleAdd = (e) => {
        e.preventDefault();
        setLeads([...leads, { ...form, id: Date.now(), stage: 'lead' }]);
        setIsModalOpen(false);
        setForm({ name: '', source: 'web', score: 50 });
      };

      const borderColors = { lead: 'border-slate-300', qualified: 'border-blue-400', proposal: 'border-amber-400', won: 'border-emerald-500', lost: 'border-red-400' };
      const badgeColors = { won: 'success', lost: 'danger', proposal: 'warning' };

      return (
        <div className="h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <p className="text-slate-500 text-sm hidden md:block">Drag and drop leads to update their pipeline stage.</p>
            <Button onClick={() => setIsModalOpen(true)} className="ml-auto"><Plus size={16} className="mr-2" /> Add Lead</Button>
          </div>

          <div className="flex-1 flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
            {columns.map(stage => (
              <div 
                key={stage} 
                className="flex-shrink-0 w-72 bg-slate-100/50 rounded-xl p-3 flex flex-col"
                onDragOver={(e) => e.preventDefault()}
                onDrop={(e) => handleDrop(e, stage)}
              >
                <div className="flex justify-between items-center mb-4 px-1">
                  <h3 className="font-semibold text-sm text-slate-700 capitalize">{stage}</h3>
                  <span className="bg-slate-200 text-slate-600 text-xs px-2 py-0.5 rounded-full font-medium">
                    {leads.filter(l => l.stage === stage).length}
                  </span>
                </div>
                <div className="flex-1 space-y-3 overflow-y-auto min-h-[150px] custom-scrollbar">
                  {leads.filter(l => l.stage === stage).map(lead => (
                    <Card 
                      key={lead.id} 
                      className={`p-4 cursor-grab active:cursor-grabbing border-l-4 ${borderColors[stage]}`}
                      draggable
                      onDragStart={(e) => handleDragStart(e, lead.id)}
                    >
                      <div className="flex justify-between items-start mb-2">
                        <h4 className="font-semibold text-slate-900 text-sm">{lead.name}</h4>
                        <GripVertical size={14} className="text-slate-300 cursor-grab" />
                      </div>
                      <div className="flex justify-between items-center mt-4">
                        <Badge variant={badgeColors[stage] || 'default'} className="text-[10px] capitalize">{lead.source}</Badge>
                        <div className="flex items-center text-xs font-medium text-slate-500">
                          Score: <span className={`ml-1 font-bold ${lead.score > 80 ? 'text-emerald-600' : ''}`}>{lead.score}</span>
                        </div>
                      </div>
                    </Card>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <Dialog isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Add New Lead">
            <form onSubmit={handleAdd} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Company / Name</label>
                <Input required value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="e.g. Wayne Enterprises" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Source</label>
                  <Select value={form.source} onChange={e => setForm({...form, source: e.target.value})}>
                    <option value="web">Web Form</option>
                    <option value="referral">Referral</option>
                    <option value="instagram">Instagram</option>
                    <option value="whatsapp">WhatsApp</option>
                  </Select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Lead Score</label>
                  <Input type="number" min="0" max="100" required value={form.score} onChange={e => setForm({...form, score: parseInt(e.target.value) || 0})} />
                </div>
              </div>
              <div className="pt-4 flex justify-end gap-3">
                <Button type="button" variant="ghost" onClick={() => setIsModalOpen(false)}>Cancel</Button>
                <Button type="submit">Create Lead</Button>
              </div>
            </form>
          </Dialog>
        </div>
      );
    }

    // ============================================================================
    // 6. CLIENTS PAGE
    // ============================================================================

    function ClientsView({ clients, setClients }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [clientSearch, setClientSearch] = useState('');
      const [form, setForm] = useState({ name: '', company: '', email: '', phone: '', status: 'active' });

      const handleAdd = (e) => {
        e.preventDefault();
        setClients([...clients, { ...form, id: Date.now() }]);
        setIsModalOpen(false);
        setForm({ name: '', company: '', email: '', phone: '', status: 'active' });
      };

      const handleDelete = (id) => {
        if (confirm("Are you sure you want to delete this client?")) {
          setClients(clients.filter(c => c.id !== id));
        }
      };

      const filteredClients = clients.filter(c => 
        c.company.toLowerCase().includes(clientSearch.toLowerCase()) || 
        c.name.toLowerCase().includes(clientSearch.toLowerCase())
      );

      return (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div className="relative w-full sm:w-64">
              <Search className="absolute left-2.5 top-2.5 text-slate-400" size={16} />
              <Input 
                placeholder="Search clients..." 
                value={clientSearch}
                onChange={(e) => setClientSearch(e.target.value)}
                className="pl-9 bg-white" 
              />
            </div>
            <Button onClick={() => setIsModalOpen(true)} className="sm:ml-auto"><Plus size={16} className="mr-2" /> Add Client</Button>
          </div>

          <Card className="overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-50 text-slate-500">
                  <tr>
                    <th className="px-6 py-3 font-medium">Company</th>
                    <th className="px-6 py-3 font-medium">Contact Person</th>
                    <th className="px-6 py-3 font-medium">Status</th>
                    <th className="px-6 py-3 font-medium text-right">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {filteredClients.map(c => (
                    <tr key={c.id} className="hover:bg-slate-50/50 transition-colors">
                      <td className="px-6 py-4 font-semibold text-slate-900">{c.company}</td>
                      <td className="px-6 py-4">
                        <div className="text-slate-900 font-medium">{c.name}</div>
                        <div className="flex items-center gap-3 mt-1">
                          <a href={getEmailLink(c.email, `Hi ${c.name},`, '')} className="flex items-center text-xs text-slate-500 hover:text-blue-600 transition-colors" title="Send Email">
                            <Mail size={12} className="mr-1"/> {c.email}
                          </a>
                          <a href={getWhatsAppLink(c.phone, `Hi ${c.name},`)} target="_blank" rel="noreferrer" className="flex items-center text-xs text-slate-500 hover:text-green-600 transition-colors" title="Send WhatsApp">
                            <MessageCircle size={12} className="mr-1"/> {c.phone}
                          </a>
                        </div>
                      </td>
                      <td className="px-6 py-4">
                        <Badge variant={c.status === 'active' ? 'success' : 'default'} className="capitalize">{c.status}</Badge>
                      </td>
                      <td className="px-6 py-4 text-right">
                        <button onClick={() => handleDelete(c.id)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all" title="Delete Client">
                          <Trash2 size={16} />
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>

          <Dialog isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Add New Client">
            <form onSubmit={handleAdd} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Company Name</label>
                <Input required value={form.company} onChange={e => setForm({...form, company: e.target.value})} placeholder="e.g. Wayne Enterprises" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Contact Name</label>
                <Input required value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="e.g. Bruce Wayne" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Email</label>
                  <Input type="email" required value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="bruce@wayne.com" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Phone</label>
